            class Armor {
                constructor() {
                    this.resistances = [];
                    this.stats = [];
                    this.upgrades = 0;
                    this.res_target = 29;
                    this.statcap = 999;
                    this.bonus_multiplier = 1.4;
                    this.ups_on_res = 0;
                    this.spare_ups = 0;
                    this.upped_res = [];
                    this.upped_stats = [];
                    this.calculated = false;
                }
                
                Calculate() {
                    this.upped_res = this.resistances.slice();
                    this.upped_res = HighestValueFirst(this.upped_res);
                    this.upped_stats = this.stats.slice();
                    this.ups_on_res = 0;
                    let ups_spent = 0;
                    let up_count = 0;
                    let i = 0;
                    loop:
                    while (up_count < this.upgrades - 1) {
                        i = 0;
                        while (i < this.upped_res.length) {
                            if (this.upped_res[i] < this.res_target) {
                                if (this.upped_res[i] >= 23 && ((up_count + 2) % 10) !== 0) {
                                    i += 1;
                                    continue;
                                }
                                this.upped_res[i] = UpgradeRes(this.upped_res[i]);
                                ups_spent += 1;
                                up_count += 1;
                                this.ups_on_res += 1;
                                continue loop;
                            }
                            i += 1;
                        }
                        i = 0;
                        while (i < this.upped_stats.length) {
                            if (this.upped_stats[i] < this.statcap) {
                                this.upped_stats[i] += 1;
                                ups_spent += 1;
                                up_count += 1;
                                continue loop;
                            }
                            i += 1;
                        }
                        up_count += 1;
                    }
                    if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
                    this.calculated = true;
                }
                
                GetTotal() {
                    if (!this.calculated) this.Calculate();
                    return Sum(this.upped_stats);
                }
                
                GetTotalBonus() {
                    if (!this.calculated) this.Calculate();
                    let totalbonus = 0;
                    for (const stat of this.upped_stats) {
                        totalbonus += Math.ceil(stat * this.bonus_multiplier);
                    }
                    return totalbonus;
                }
                
                GetUppedStats() {
                    if (!this.calculated) this.Calculate();
                    return this.upped_stats;
                }
                
                GetUppedBonus() {
                    if (!this.calculated) this.Calculate();
                    const statlist = this.upped_stats.slice();
                    let bonuslist = [];
                    for (const stat of statlist) {
                        bonuslist.push(Math.ceil(stat * this.bonus_multiplier));
                    }
                    return bonuslist;
                }
                
                GetResBonus() {
                    if (!this.calculated) this.Calculate();
                    const reslist = this.upped_res.slice();
                    let bonuslist = [];
                    for (const res of reslist) {
                        bonuslist.push(Math.ceil(res * this.bonus_multiplier));
                    }
                    return bonuslist;
                }
            }
            
            class Weapon {
                constructor() {
                    this.damage = 0;
                    this.edamage = 0;
                    this.damage_per_up = 0;
                    this.edamage_per_up = 0;
                    this.rate = 0;
                    this.max_rate = 0;
                    this.projcount = 0;
                    this.max_projcount = 0;
                    this.projspeed = 0;
                    this.charge = 0;
                    this.knockback = 0;
                    this.max_knockback = 0;
                    this.priostat = 0;
                    this.statcap = 0;
                    this.upgrades = 0;
                    this.upped_damage = 0;
                    this.upped_edamage = 0;
                    this.upped_rate = 0;
                    this.upped_projcount = 0;
                    this.upped_projspeed = 0;
                    this.upped_charge = 0;
                    this.upped_knockback = 0;
                    this.upped_priostat = 0;
                    this.spare_ups = 0;
                    this.calculated = false;
                }
                
                Calculate() {
                    this.upped_damage = this.damage;
                    this.upped_edamage = this.edamage;
                    this.upped_rate = this.rate;
                    this.upped_projcount = this.projcount;
                    this.upped_projspeed = this.projspeed;
                    this.upped_charge = this.charge;
                    this.upped_knockback = this.knockback;
                    this.upped_priostat = this.priostat;
                    this.spare_ups = 0;
                    let ups_spent = 0;
                    let up_count = 0;
                    loop:
                    while (up_count < this.upgrades - 1) {
                        if (this.upped_projcount > 0 && this.upped_projcount < this.max_projcount && (up_count + 2) % 5 === 0) {
                            this.upped_projcount += 1;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_rate > 0 && this.upped_rate < this.max_rate && (up_count + 2) % 4 === 0) {
                            this.upped_rate += 1;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_priostat > 0 && this.upped_priostat < this.statcap) {
                            this.upped_priostat += 1;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_charge !== 0 && this.upped_charge < 128) {
                            this.upped_charge = UpgradeCharge(this.upped_charge);
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_knockback !== 0 && this.upped_knockback < this.max_knockback) {
                            this.upped_knockback = UpgradeKnockback(this.upped_knockback);
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_projspeed !== 0 && this.upped_projspeed < 30000) {
                            this.upped_projspeed = UpgradeProjSpeed(this.upped_projspeed);
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_damage > 0 && this.upped_edamage > 0) {
                            if (this.upped_damage > this.upped_edamage) 
                                this.upped_edamage += this.edamage_per_up;
                            else this.upped_damage += this.damage_per_up;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_damage > 0) {
                            this.upped_damage += this.damage_per_up;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_edamage > 0) {
                            this.upped_edamage += this.edamage_per_up;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        up_count += 1;
                    }
                    this.upped_damage = Math.floor(this.upped_damage);
                    this.upped_edamage = Math.floor(this.upped_edamage);
                    if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
                    this.calculated = true;
                }
            }

                        }
                        if (this.upped_damage > 0) {
                            this.upped_damage += this.damage_per_up;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        up_count += 1;
                    }
                    if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
                    this.calculated = true;
                }
            }
            
            class Cat {
                constructor() {
                    this.boost = 0;
                    this.range = 0;
                    this.max_range = 0;
                    this.targets = 0;
                    this.max_targets = 0;
                    this.upgrades = 0;
                    this.upped_boost = 0;
                    this.upped_range = 0;
                    this.upped_targets = 0;
                    this.spare_ups = 0;
                    this.calculated = false;
                }
                
                Calculate() {
                    this.upped_boost = this.boost;
                    this.upped_range = this.range;
                    this.upped_targets = this.targets;
                    this.spare_ups = 0;
                    let ups_spent = 0;
                    let up_count = 0;
                    loop:
                    while (up_count < this.upgrades - 1) {
                        if (this.upped_targets > 0 && this.upped_targets < this.max_targets && (up_count + 2) % 30 === 0) {
                            this.upped_targets += 1;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_boost > 0 && (up_count + 2) % 3 === 0) {
                            this.upped_boost += 1;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        if (this.upped_range > 0 && this.upped_range < this.max_range && (up_count + 2) % 5 === 0) {
                            this.upped_range += 1;
                            ups_spent += 1;
                            up_count += 1;
                            continue loop;
                        }
                        up_count += 1;
                    }
                    if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
                    this.calculated = true;
                }
            }
            
            class StatStick {
                constructor() {
                    this.stats = [];
                    this.statcap = 0;
                    this.upgrades = 0;
                    this.upped_stats = [];
                    this.spare_ups = 0;
                    this.calculated = false;
                }
                
                Calculate() {
                    this.upped_stats = this.stats.slice();
                    this.spare_ups = 0;
                    let ups_spent = 0;
                    let up_count = 0;
                    let i = 0;
                    loop:
                    while (up_count < this.upgrades - 1) {
                        i = 0;
                        while (i < this.upped_stats.length) {
                            if (this.upped_stats[i] < this.statcap) {
                                this.upped_stats[i] += 1;
                                ups_spent += 1;
                                up_count += 1;
                                continue loop;
                            }
                            i += 1;
                        }
                        up_count += 1;
                    }
                    if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
                    this.calculated = true;
                }
            }

            function UpgradeRes(res) {
                //todo convert to res *= 1.15
                res = parseInt(res);
                if (res === 0 || isNaN(res)) {
                    PrintLog("res value 0, cannot upgrade");
                    return NaN;
                }
                if (res >= 23) return res + 1;
                if (res >= 20) return res + 3;
                if (res >= 14) return res + 2;
                if (res >= 1) return res + 1;
                if (res === -1) return 1;
                if (res >= -13) return res + 1;
                if (res >= -19) return res + 2;
                if (res >= -25) return res + 3;
                else return res + 4;
            }

            function UpsToMaxRes(res) {
                switch(res) {
                    case 23: case 24: case 25: case 26: case 27: case 28: case 29:
                        return 29 - res;
                    case 20: case 21: case 22:
                        return 29 - res - 2;
                    case 19:
                        return 7;
                    case 17: case 18:
                        return 8;
                    case 15: case 16:
                        return 9;
                    case 1: case 2: case 3: case 4: case 5: case 6: case 7: case 8:
                    case 9: case 10: case 11: case 12: case 13: case 14:
                        return 14 - res + 10;
                    case 0:
                        PrintLog("res value 0, cannot upgrade");
                        return 0;
                    case -1: case -2: case -3: case -4: case -5: case -6: case -7:
                    case -8: case -9: case -10: case -11: case -12:
                        return 23 - res;
                    case -13: case -14:
                        return 36;
                    case -15: case -16:
                        return 37;
                    case -17: case -18:
                        return 38;
                }
                PrintLog("res value outside expected range, ignoring");
                return 0;
            }
            
            function UpgradeCharge(charge) {
                if (charge >= 128) {
                    PrintLog("charge speed over 128, cannot upgrade");
                    return charge;
                }
                if (charge === -1) return 1;
                let quarter = Math.floor(Math.abs(charge) * 0.25);
                if (quarter <= 1) quarter = 1;
                if (quarter >= 4) quarter = 4;
                if (charge + quarter >= 128) return 128;
                else return charge + quarter;
            }
            
            function UpgradeKnockback(knockback) {
                if (knockback >= 128) {
                    PrintLog("knockback over 128, cannot upgrade");
                    return knockback;
                }
                if (knockback === -1) return 1;
                let quarter = Math.floor(Math.abs(knockback) * 0.25);
                if (quarter <= 1) quarter = 1;
                if (quarter >= 4) quarter = 4;
                if (knockback + quarter >= 128) return 128;
                else return knockback + quarter;
            }
            
            function UpgradeProjSpeed(projspeed) {
                if (projspeed >= 30000) {
                    PrintLog("projectile speed over 30k, cannot upgrade");
                    return projspeed;
                }
                if (projspeed === -100) return 1;
                let quarter = Math.floor(Math.abs(projspeed) * 0.25);
                if (quarter <= 100) return projspeed + 100;
                if (quarter >= 1200) return projspeed + 1200;
                return projspeed + quarter;
            }
            
            function UpsToMaxProjSpeed(projspeed) {
                if (projspeed >= 30000) return 0;
                if (projspeed >= 4800) return Math.ceil((30000 - projspeed) / 1200);
                let ups = 0;
                let quarter = 0;
                while (projspeed < 30000) {
                    quarter = Math.floor(Math.abs(projspeed) * 0.25);
                    if (quarter < 100) quarter = 100;
                    if (quarter > 1200) quarter = 1200;
                    projspeed += quarter;
                    ups += 1;
                }
                return ups;
            }

            function Sum(array) {
                let sum = 0;
                for (const element of array) {

            }
            
            function HighestValueFirst(array) {
                const max = Math.max(...array);
                let spliced = [];
                
                for (let i = 0; i < array.length; i++) {
                    if (array[i] === max) {
                        spliced = array.splice(i, 1);
                        array.unshift(spliced[0]);
                        break;
                    }
                }
                return array;
            }
