<!DOCTYPE html>

<head>
    
<title>DunDefCalc</title>

<style>
    
html * {
    font-family: sans-serif;
    font-size: 18px;
    color: black;
}
body {
    background-image: linear-gradient(140deg, #ffffff, #eeeeee);
    background-attachment: fixed;
    background-size: cover;
}
.calculator {
    line-height: 1.8;
    background-color: #ddffdd;
    background-image: linear-gradient(140deg, #f0fff0, #ccffcc);
    background-attachment: fixed;
    background-size: cover;
    width: 600px;
    padding: 10px;
    margin: auto;
    margin-top: 30px;
    border-style: solid;
    border-radius: 10px;
    border-color: #00aa00;
    border-width: 2px;
}
.calculator div {
    margin: auto;
}
.calculator table {
    width: 100%;
}
.select {

}
.subselect {

}
.fields {
    padding-top: 10px;
    padding-bottom: 10px;
    line-height: 2;
}
.fields td {
    height: 36px;
    line-height: 1;
}
.result {
    background-color: #ffffff;
    line-height: 1.5;
    padding: 5px 10px;
}
.log {
    width: 600px;
    background-color: #ffffff;
    padding: 10px;
    margin: auto;
    line-height: 1.5;
}
.logmsg {
    color: black;
}
.errormsg {
    color: red;
}
.about {
    line-height: 1.5;
    background-color: #ffffff;
    padding: 10px;
    font-size: 16px;
}
.searchbox {
    display: inline-block;
}
.searchbox input {
    width: 120px !important;
}
.searchresults {
    display: none;
    position: absolute;
    min-width: 200px;
    max-height: 300px;
    overflow-y: scroll;
    overflow-x: hidden;
    background-color: #ffffff;
}
.searchresults button {
    width: 100%;
    height: 30px;
    text-align: left;
    background-image: none;
    background-color: #ffffff !important;
    padding-left: 10px;
    padding-right: 10px;
    margin: 0px;
    border-width: 0px;
}
.searchresults button:hover {
    background-color: #eeeeee !important;
}
.infobox {
    display: inline-block;
    cursor: default;
}
.infobox div {
    display: none;
    background-color: #ffffff;
    position: absolute;
    font-size: 14px;
    max-width: 300px;
    padding-top: 5px;
    padding-bottom: 5px;
    padding-left: 10px;
    padding-right: 10px;
    line-height: 1.6;
    border-style: solid;
    border-color: #000000;
    border-width: 1px;
}
.infobox:hover div {
    display: block;
}
input[type=text] {
    width: 70px;
    font-size: 16px;
    vertical-align: middle;
    height: 22px;
    border-radius: 4px;
    border-color: #777777;
    border-width: 1px;
}
input[type=checkbox] {
    width: 14px;
    height: 14px;
    vertical-align: middle;
}
input:disabled {
    color: #666666;
    border-color: #dddddd;
    background-color: #f4f4f4;
    border-width: 1px;
}
select {
    font-size: 16px;
    background-color: white;
    height: 24px;
    vertical-align: middle;
    border-radius: 4px;
    margin: 0px;
    padding: 0px;
    padding-left: 3px;
    border-color: #777777;
    border-width: 1px;
    max-width: 200px;
}
select:disabled {
    color: #666666;
    border-color: #dddddd;
    background-color: #f4f4f4;
    border-width: 1px;
}
optgroup {
    font-size: 16px;
    font-weight: normal;
    background-color: #eeeeee;
}
option {
    font-size: 16px;
    background-color: white;
}
button {
    font-size: 16px;
    vertical-align: middle;
    height: 24px;
    background-color: #eeeeee;

</head>

<div class="calculator">
<div class="select">
    <select id="itemtype" onchange="ChangeItemType(this.value)">

<script>

function ChangeItemType(itemtype) {
    /*
     * prints html content on the subselect div based on provided item type
     */
    ClearResult();
    ClearLog();
    
    console.log("ChangeItemType: item type " + itemtype);
    
    let htmlstring = "";

    switch (itemtype) {
        case "armor":
            document.getElementById("subselect").innerHTML = '\
<select id="quality" onchange="ChangeResTarget(this.value)">\n\
</select><div style="float:right;padding-right:8px">\n\
Custom res target<input type="checkbox" onchange="ChangeCustomRes(this.checked)">\n\
<input id="customres" type="text" value="29" disabled></div>';
            ChangeItem("armor");
            break;
        case "weapon":
            if (ITEMS === null) {
                document.getElementById("subselect").innerHTML = "";
                document.getElementById("fields").innerHTML = "";
                PrintLog(noItemsMessage);
                break;
            }
            htmlstring += '<select id="itemname" onchange="ChangeItem(this.value)">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "any")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '<optgroup label="Apprentice">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "apprentice")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup><optgroup label="Huntress">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "huntress")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup><optgroup label="Monk">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "monk")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup><optgroup label="Squire">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "squire")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup></select>\n';
            htmlstring += '<select id="quality"></select>\n';
            htmlstring += '<div id="infobox" class="infobox"></div>\n';
            
            document.getElementById("subselect").innerHTML = htmlstring;
            
            ChangeItem(document.getElementById("itemname").value);
            break;
        case "pet":
            if (ITEMS === null) {
                document.getElementById("subselect").innerHTML = "";
                document.getElementById("fields").innerHTML = "";
                PrintLog(noItemsMessage);
                break;
            }
            htmlstring += '<select id="itemname" onchange="ChangeItem(this.value)">\n';
            for (const obj of ITEMS.filter(obj => obj.type === "pet")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</select>\n';
            htmlstring += '<select id="quality"></select>\n';
            htmlstring += '<div id="infobox" class="infobox"></div>\n';
            
            document.getElementById("subselect").innerHTML = htmlstring;
            
            ChangeItem(document.getElementById("itemname").value);
            break;
        case "about":
            SetFields("about");
            document.getElementById("subselect").innerHTML = "";
            break;
        default:
            PrintError("ChangeItemType: item type not recognized");
            document.getElementById("subselect").innerHTML = "";
            document.getElementById("fields").innerHTML = "";
            return;
    }
}

function ChangeItem(itemname) {
    /*
     * calls SetFields and SetQualities functions based on provided item name
     */
    ClearResult();
    ClearLog();
    
    console.log("ChangeItem: item name " + itemname);
    
    if (itemname === "armor") {
        SetFields("armor");
        SetQualities("godly_ultpp");
        return;
    }
    
    const obj = ITEMS.find(obj => obj.name === itemname);
    
    const nolayout = "no suitable layout found";
    
    let upgradeorder = "";
    
    //todo write something more elegant :fridge:
    //put the layouts and upgrade orders into json or something
    if (obj.hasOwnProperty("overrideLayout")) {
        SetFields(obj.overrideLayout);
        if (obj.overrideLayout === "appmoon")
            upgradeorder = "Charge > Proj speed > Elem damage";
        else if (obj.overrideLayout === "monkmischief")
            upgradeorder = "Proj speed > Priority stat > Ranged damage";
        else if (obj.overrideLayout === "monktbwep")
            upgradeorder = "Proj count > Proj speed > Ranged damage > Stat";
        else if (obj.overrideLayout === "cat")
            upgradeorder = "Targets > Boost > Range > Stat";
        else if (obj.overrideLayout === "genie")
            upgradeorder = "Base damage > Stat";
    }
    else if (obj.type === "weapon") {
        if (obj.hero === "apprentice") {
            if (obj.hasOwnProperty("maxProjCount")) {
                if (obj.hasOwnProperty("baseDamagePerUp") && obj.hasOwnProperty("elemDamagePerUp") && obj.hasOwnProperty("elementalDamageScaling")) {
                    SetFields("appmultiprojdualwep");
                    upgradeorder = "Proj count > Charge > Proj speed > Base damage = Elem damage";
                }
                else if (obj.hasOwnProperty("baseDamagePerUp")) {
                    SetFields("appmultiprojwep");
                    upgradeorder = "Proj count > Charge > Proj speed > Base damage";
                }
                else PrintLog(nolayout);
            }
            else {
                if (obj.hasOwnProperty("baseDamagePerUp") && obj.hasOwnProperty("elemDamagePerUp") && obj.hasOwnProperty("elementalDamageScaling"))
                    PrintLog(nolayout);
                else if (obj.hasOwnProperty("baseDamagePerUp")) {
                    SetFields("appsingleprojwep");
                    upgradeorder = "Charge > Proj speed > Base damage";
                }
                else PrintLog(nolayout);
            }
        }
        else if (obj.hero === "huntress") {
            if (obj.hasOwnProperty("maxProjCount")) {
                if (obj.hasOwnProperty("maxRate")) {
                    SetFields("huntmultiprojwep");
                    upgradeorder = "Proj count > Rate > Proj speed > Base damage";
                }
                else PrintLog(nolayout);
            }
            else {
                if (obj.hasOwnProperty("maxRate")) {
                    if (obj.hasOwnProperty("maxProjSpeed")) {
                        SetFields("huntsingleprojwep");
                        upgradeorder = "Rate > Proj speed > Base damage";
                    }
                    else {
                        SetFields("huntsingleprojwepnospeed");
                        upgradeorder = "Rate > Base damage";
                    }
                }
                else {
                    if (obj.hasOwnProperty("maxProjSpeed")) {
                        SetFields("huntsingleprojwepnorate");
                        upgradeorder = "Proj speed > Base damage";
                    }
                    else SetFields("onlybdamagewep");
                }
            }
        }
        else if (obj.hero === "monk") {
            if (obj.hasOwnProperty("baseDamagePerUp")) {
                if (obj.hasOwnProperty("rangedDamagePerUp")) {
                    if (obj.hasOwnProperty("maxProjCount")) {
                        SetFields("monkmultiprojwephybrid");
                        upgradeorder = "Proj count > Proj speed > Base damage / Ranged damage";
                    }
                    else {
                        SetFields("monksingleprojwephybrid");
                        upgradeorder = "Proj speed > Base damage / Ranged damage";
                    }
                }
                else SetFields("onlybdamagewep");
            }
            else if (obj.hasOwnProperty("rangedDamagePerUp")) {
                if (obj.hasOwnProperty("maxProjCount")){
                    SetFields("monkmultiprojwep");
                    upgradeorder = "Proj count > Proj speed > Ranged damage";
                }
                else PrintLog(nolayout);
            }
            else PrintLog(nolayout);
        }
        else if (obj.hero === "squire") {
            if (obj.hasOwnProperty("maxProjSpeed")) {
                if (obj.hasOwnProperty("maxProjCount")){
                    if (obj.hasOwnProperty("rangedDamagePerUp")) {
                        SetFields("squiremultiprojwepseparated");
                        upgradeorder = "Proj count > Block > Proj speed > Base damage / Ranged damage";
                    }
                    else {
                        PrintLog(nolayout);
                    }
                }
                else if (obj.hasOwnProperty("rangedDamagePerUp")) {
                    SetFields("squiresingleprojwepseparated");
                    upgradeorder = "Block > Proj speed > Base damage / Ranged damage";
                }
                else {
                    SetFields("squiresingleprojwep");
                    upgradeorder = "Block > Proj speed > Base damage";
                }
            }
            else {
                SetFields("squiremeleewep");
                upgradeorder = "Block > Base damage";
            }
        }
        else PrintLog(nolayout);
    }
    else if (obj.type === "pet") {
        if (obj.hasOwnProperty("maxProjCount")) {
            if (obj.hasOwnProperty("maxKnockback")) {
                SetFields("hybridmultiprojpet");
                upgradeorder = "Proj count > Rate > Knockback > Proj speed > Base damage";
            }
            else {
                SetFields("multiprojpet");
                upgradeorder = "Proj count > Rate > Proj speed > Base damage";
            }
        }
        else {
            if (obj.hasOwnProperty("maxProjSpeed")) {
                if (obj.hasOwnProperty("maxRate")) {
                    if (obj.hasOwnProperty("maxKnockback")) {
                        SetFields("hybridsingleprojpet");
                        upgradeorder = "Rate > Knockback > Proj speed > Base damage";
                    }
                    else {
                        SetFields("singleprojpet");
                        upgradeorder = "Rate > Proj speed > Base damage";
                    }
                }
                else {
                    SetFields("singleprojpetnorate");
                    upgradeorder = "Proj speed > Base damage";
                }
            }
            else {
                if (obj.hasOwnProperty("maxKnockback")) {
                    SetFields("meleepet");
                    upgradeorder = "Rate > Knockback > Base damage";
                }
                else {
                    SetFields("meleepetnoknockback");
                    upgradeorder = "Rate > Base damage";
                }
            }
        }
    }
    else {
        PrintError("ChangeItem: item not recognized");
    }
    
    if (obj.hasOwnProperty("overrideQualityRange")) SetQualities(obj.overrideQualityRange);
    else if (obj.hasOwnProperty("ultBaseDamagePerUp")) SetQualities("sup_ult");
    else SetQualities("any");
    
    let infotext = "";
    let ultBasePerUp = GetBaseDamagePerUp(obj, true);
    let basePerUp = GetBaseDamagePerUp(obj);
    if (ultBasePerUp < basePerUp) ultBasePerUp = basePerUp;
    let rangedPerUp = GetRangedDamagePerUp(obj);
    let elemPerUp = GetElemDamagePerUp(obj);
    
    if (upgradeorder !== "") 
        infotext += "Upgrade order: <br>" + upgradeorder + "<hr>";
    if (ultBasePerUp > 0)
        infotext += "Ult base damage per up: " + Math.round(ultBasePerUp * 100) / 100 + "<br>";
    if (basePerUp > 0)
        infotext += "Base damage per up: " + Math.round(basePerUp * 100) / 100 + "<br>";
    if (rangedPerUp > 0)
        infotext += "Ranged damage per up: " + Math.round(rangedPerUp * 100) / 100 + "<br>";
    if (elemPerUp > 0)
        infotext += "Elemental damage per up: " + Math.round(elemPerUp * 100) / 100 + "<br>";
    if (obj.hasOwnProperty("maxRate"))
        infotext += "Max rate: " + obj.maxRate + "<br>";
    if (obj.hasOwnProperty("maxKnockback"))
        infotext += "Max knockback: " + obj.maxKnockback + "<br>";
    if (obj.hasOwnProperty("maxProjCount"))
        infotext += "Max proj count: " + obj.maxProjCount + "<br>";
    if (obj.hasOwnProperty("maxProjSpeed"))
        infotext += "Max proj speed: " + obj.maxProjSpeed + "<br>";
    if (obj.hasOwnProperty("maxRange"))
        infotext += "Max range: " + obj.maxRange + "<br>";
    if (obj.hasOwnProperty("maxTargets"))
        infotext += "Max targets: " + obj.maxTargets + "<br>";
    if (obj.hasOwnProperty("statCap"))
        infotext += "Stat cap: " + obj.statCap + "<br>";
    if (obj.hasOwnProperty("moveSpeedMultiplier"))
        infotext += "Movespeed multiplier: " + obj.moveSpeedMultiplier + "<br>";
    if (obj.hasOwnProperty("gravityMultiplier"))
        infotext += "Gravity multiplier: " + obj.gravityMultiplier + "<br>";
    if (obj.hasOwnProperty("elementalDamageScaling"))
        infotext += "Elemental damage scaling<br>";
    
    if (infotext !== "") infotext = infotext.substring(0, infotext.length - 4);
    
    SetInfo(infotext);
}

function SetInfo(text) {
    if (text === "" || text === null)
        document.getElementById("infobox").innerHTML = "";
    else
        document.getElementById("infobox").innerHTML = "&#9432;<div>" + text + "</div>";
}

function SetUpgradeValues(item, itemname, quality) {
    /*
     * sets upgrade values into a provided instance of Item class
     */
    for (const obj of ITEMS) {
        if (itemname === obj.name) {
            if (obj.hasOwnProperty("ultBaseDamagePerUp")) item.ult_bdamage_per_up = obj.ultBaseDamagePerUp;
            if (obj.hasOwnProperty("baseDamagePerUp")) item.bdamage_per_up = obj.baseDamagePerUp;
            if (obj.hasOwnProperty("rangedDamagePerUp")) item.rdamage_per_up = obj.rangedDamagePerUp;
            if (obj.hasOwnProperty("elemDamagePerUp")) item.edamage_per_up = obj.elemDamagePerUp;
            if (obj.hasOwnProperty("ultBaseDamageUpMultiplier")) item.ult_bdamage_up_multiplier = obj.ultBaseDamageUpMultiplier;
            if (obj.hasOwnProperty("baseDamageUpMultiplier")) item.bdamage_up_multiplier = obj.baseDamageUpMultiplier;
            if (obj.hasOwnProperty("rangedDamageUpMultiplier")) item.rdamage_up_multiplier = obj.rangedDamageUpMultiplier;
            if (obj.hasOwnProperty("elemDamageUpMultiplier")) item.edamage_up_multiplier = obj.elemDamageUpMultiplier;
            if (obj.hasOwnProperty("baseDamageMultiplier")) item.bdamage_multiplier = obj.baseDamageMultiplier;
            if (obj.hasOwnProperty("rangedDamageMultiplier")) item.rdamage_multiplier = obj.rangedDamageMultiplier;
            if (obj.hasOwnProperty("elemDamageMultiplier")) item.edamage_multiplier = obj.elemDamageMultiplier;
            if (obj.hasOwnProperty("templateDamageMultiplier")) item.template_multiplier = obj.templateDamageMultiplier;
            if (obj.hasOwnProperty("swingSpeedDamageMultiplier")) item.swing_multiplier = obj.swingSpeedDamageMultiplier;
            if (obj.hasOwnProperty("playerDamageMultiplier")) item.player_damage_multiplier = obj.playerDamageMultiplier;
            if (obj.hasOwnProperty("damageDisplayMultiplier")) item.damage_display_multiplier = obj.damageDisplayMultiplier;
            if (obj.hasOwnProperty("rangedDamageDisplayMultiplier")) item.ranged_display_multiplier = obj.rangedDamageDisplayMultiplier;
            if (obj.hasOwnProperty("maxRate")) item.max_rate = obj.maxRate;
            if (obj.hasOwnProperty("maxKnockback")) item.max_knockback = obj.maxKnockback;
            if (obj.hasOwnProperty("maxProjCount")) item.max_projcount = obj.maxProjCount;
            if (obj.hasOwnProperty("maxProjSpeed")) item.max_projspeed = obj.maxProjSpeed;
            if (obj.hasOwnProperty("maxBoost")) item.max_boost = obj.maxBoost;
            if (obj.hasOwnProperty("maxRange")) item.max_range = obj.maxRange;
            if (obj.hasOwnProperty("maxTargets")) item.max_targets = obj.maxTargets;
            if (obj.hasOwnProperty("statCap")) item.statcap = obj.statCap;
            else item.statcap = StatCap(quality);
            console.log("SetUpgradeValues: upgrade values fetched for item " + obj.name);
            return true;
        }
    }
    return false;
}

}

    /*
     * checks if all input elements inside the fields div are empty
     * returns a boolean
     */
    for (const element of document.getElementById("fields").getElementsByTagName("input")) {
        if (element.value !== "") return false;
    }
    console.log("all input fields are empty");
    return true;
}

function SearchItems() {
    if (ITEMS === null) {
        ClearLog();
        PrintLog(noItemsMessage);
        return;
    }

    const searchstring = document.getElementById("searchbox").value.toUpperCase();
    
    if (searchstring === "") {
        HideSearch();
        return;
    }
    
    const searchresults = document.getElementById("searchresults");
    const sorteditems = ITEMS.toSorted((a, b) => {return a.displayName.toUpperCase().indexOf(searchstring) - b.displayName.toUpperCase().indexOf(searchstring);});
    
    let htmlstring = "";
    let resultcount = 0;
    
    for (const obj of sorteditems) {
        if (obj.displayName.toUpperCase().includes(searchstring)) {
            htmlstring += '<div><button value="' + obj.name + '" onclick="SelectSearchResult(this.value)">' + obj.displayName + '</button></div>\n';
            resultcount += 1;
        }
    }
    
    if (resultcount > 10) searchresults.style.overflowY = "scroll";
    else searchresults.style.overflowY = "hidden";
    
    searchresults.innerHTML = htmlstring;
    
    ShowSearch();
    searchresults.scrollTop = 0;
}

function SelectSearchResult(itemname) {
    const obj = ITEMS.find(obj => obj.name === itemname);
    
    document.getElementById("itemtype").value = obj.type;
    ChangeItemType(obj.type);
    
    document.getElementById("itemname").value = obj.name;
    ChangeItem(obj.name);
    
    document.getElementById("searchbox").value = "";
    HideSearch();
}

function HideSearch() {
    setTimeout(() => {
        document.getElementById("searchresults").style.display = "none";
    }, 50);
}

function ShowSearch() {
    document.getElementById("searchresults").style.display = "inline-block";
}

        this.projcount = 0;
        this.max_projcount = 0;
        this.projspeed = 0;
        this.max_projspeed = 30000;
        this.stat = 0;
        this.priostat = 0;
        this.statcap = 999;
        this.upgrades = 0;
        this.upped_bdamage = 0;
        this.upped_rdamage = 0;
        this.upped_edamage = 0;
        this.upped_rate = 0;
        this.upped_block = 0;
        this.upped_projcount = 0;
        this.upped_projspeed = 0;
        this.upped_charge = 0;
        this.upped_knockback = 0;
        this.upped_stat = 0;
        this.upped_priostat = 0;
        this.spare_ups = 0;
        this.calculated = false;
    }
    
    InitializeUppedValues() {
        this.upped_bdamage = this.BaseDamageRawValue(this.bdamage);
        this.upped_rdamage = this.RangedDamageRawValue(this.rdamage);
        this.upped_edamage = this.ElemDamageRawValue(this.edamage);
        this.bdamage_per_up = Math.floor(this.bdamage_per_up);
        this.rdamage_per_up = Math.floor(this.rdamage_per_up);
        this.edamage_per_up = Math.floor(this.edamage_per_up);
        this.upped_rate = this.rate;
        this.upped_block = this.block;
        this.upped_knockback = this.knockback;
        this.upped_charge = this.charge;
        this.upped_projcount = this.projcount;
        this.upped_projspeed = this.projspeed;
        this.upped_stat = this.stat;
        this.upped_priostat = this.priostat;
    }
    
    ConvertDamageToDisplayValues() {
        this.upped_bdamage = this.BaseDamageDisplayValue();
        this.upped_rdamage = this.RangedDamageDisplayValue();
        this.upped_edamage = this.ElemDamageDisplayValue();
    }
    
    BaseDamageRawValue(val = this.upped_bdamage) {
        val = Math.ceil(val / this.bdamage_multiplier / this.template_multiplier / this.swing_multiplier - Number.EPSILON);
        val = Math.ceil(val / this.player_damage_multiplier / this.damage_display_multiplier - Number.EPSILON);
        return val;
    }
    
    BaseDamageDisplayValue(val = this.upped_bdamage) {
        val = Math.floor(val * this.player_damage_multiplier * this.damage_display_multiplier + Number.EPSILON);
        val = Math.floor(val * this.bdamage_multiplier * this.template_multiplier * this.swing_multiplier + Number.EPSILON);
        return val;
        //return Math.floor(this.upped_bdamage * this.bdamage_multiplier * this.damage_display_multiplier * this.template_multiplier * this.swing_multiplier * this.player_damage_multiplier);
    }
    
    RangedDamageRawValue(val = this.upped_rdamage) {
        val = Math.ceil(val / this.rdamage_multiplier - Number.EPSILON);
        val = Math.ceil(val / this.player_damage_multiplier / this.ranged_display_multiplier - Number.EPSILON);
        return val;
    }
    
    RangedDamageDisplayValue(val = this.upped_rdamage) {
        val = Math.floor(val * this.player_damage_multiplier * this.ranged_display_multiplier + Number.EPSILON);
        val = Math.floor(val * this.rdamage_multiplier + Number.EPSILON);
        return val;
        //return Math.floor(this.upped_rdamage * this.rdamage_multiplier * this.ranged_display_multiplier * this.player_damage_multiplier);
    }
    
    ElemDamageRawValue(val = this.upped_edamage) {
        return Math.ceil(val / this.edamage_multiplier / this.damage_display_multiplier / this.player_damage_multiplier - Number.EPSILON);
    }
    
    ElemDamageDisplayValue(val = this.upped_edamage) {
        return Math.floor(val * this.edamage_multiplier * this.damage_display_multiplier * this.player_damage_multiplier + Number.EPSILON);
    }
    
    UpgradeBaseDamage() {
        const multiplier = (this.quality.includes("ult") && this.ult_bdamage_up_multiplier >= this.bdamage_up_multiplier) ? this.ult_bdamage_up_multiplier : this.bdamage_up_multiplier;
        const damage_per_up = (this.quality.includes("ult") && this.ult_bdamage_per_up >= this.bdamage_per_up) ? this.ult_bdamage_per_up : this.bdamage_per_up;
        let up_amount = 0;
        if (this.upped_bdamage * multiplier < damage_per_up) 
            up_amount = Math.floor(this.upped_bdamage * multiplier + Number.EPSILON);
        else {
            this.upped_bdamage += Math.floor(damage_per_up);
            return;
        }
        if (up_amount < 1) this.upped_bdamage += 1;
        else this.upped_bdamage += up_amount;
    }
    
    UpgradeRangedDamage() {
        let up_amount = 0;
        if (this.upped_rdamage * this.rdamage_up_multiplier < this.rdamage_per_up) 
            up_amount = Math.floor(this.upped_rdamage * this.rdamage_up_multiplier + Number.EPSILON);
        else {
            this.upped_rdamage += Math.floor(this.rdamage_per_up);
            return;
        }
        if (up_amount < 1) this.upped_rdamage += 1;
        else this.upped_rdamage += up_amount;
    }
    
    UpgradeElemDamage() {
        let up_amount = 0;
        if (this.upped_edamage * this.edamage_up_multiplier < this.edamage_per_up) 
            up_amount = Math.floor(this.upped_edamage * this.edamage_up_multiplier + Number.EPSILON);
        else {
            this.upped_edamage += Math.floor(this.edamage_per_up);
            return;
        }
        if (up_amount < 1) this.upped_edamage += 1;
        else this.upped_edamage += up_amount;
    }
    
    UpgradeCharge() {
        if (this.upped_charge >= 128) {
            PrintError("UpgradeCharge: charge speed over 128, cannot upgrade");
            return;
        }
        else if (this.upped_charge === 0) {
            PrintError("UpgradeCharge: charge speed 0, cannot upgrade");
            return;
        }
        else if (this.upped_charge === -1) {
            this.upped_charge = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_charge) * 0.25);
        if (up_amount <= 1) up_amount = 1;
        else if (up_amount >= 4) up_amount = 4;
        if (this.upped_charge + up_amount >= 128) this.upped_charge = 128;
        else this.upped_charge += up_amount;
    }
    
    UpgradeBlock() {
        if (this.upped_block === 0) {
            PrintError("UpgradeBlock: block value 0, cannot upgrade");
            return;
        }
        else if (this.upped_block === -5) {
            this.upped_block = 1;
            return;
        }
        this.upped_block += 5;
    }
    
    UpgradeKnockback() {
        if (this.upped_knockback >= 128) {
            PrintError("UpgradeKnockback: knockback over 128, cannot upgrade");
            return;
        }
        else if (this.upped_knockback === 0) {
            PrintError("UpgradeKnockback: knockback 0, cannot upgrade");
            return;
        }
        else if (this.upped_knockback === -1) {
            this.upped_knockback = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_knockback) * 0.25);
        if (up_amount <= 1) up_amount = 1;
        else if (up_amount >= 4) up_amount = 4;
        if (this.upped_knockback + up_amount >= 128) this.upped_knockback = 128;
        else this.upped_knockback += up_amount;
    }
    
    UpgradeProjSpeed() {
        if (this.upped_projspeed === 0) {
            PrintError("UpgradeProjSpeed: projectile speed 0, cannot upgrade");
            return;
        }
        else if (this.upped_projspeed === -100) {
            this.upped_projspeed = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_projspeed) * 0.25);
        if (up_amount <= 100) this.upped_projspeed += 100;
        else if (up_amount >= 1200) this.upped_projspeed += 1200;
        else this.upped_projspeed += up_amount;
    }
    
    UpgradePrioStat() {
        if (this.upped_priostat === 0) PrintError("UpgradePrioStat: stat value 0, cannot upgrade");
        else if (this.upped_priostat === -1) this.upped_priostat = 1;
        else this.upped_priostat += 1;
    }
    
    UpgradeStat() {
        if (this.upped_stat === 0) PrintError("UpgradeStat: stat value 0, cannot upgrade");
        else if (this.upped_stat === -1) this.upped_stat = 1;
        else this.upped_stat += 1;
    }
}

class Armor extends Item {
    constructor() {
        super();
        this.resistances = [];
        this.stats = [];
        this.res_target = 29;
        this.bonus_multiplier = 1.4;
        this.ups_on_res = 0;
        this.upped_res = [];
        this.upped_stats = [];
    }
    
    UpgradeResistance(i) {
        if (isNaN(i)) {
            PrintError("UpgradeResistance: array index is not a number");
            return;
        }
        if (this.upped_res[i] === 0) {
            PrintError("UpgradeResistance: resistance value 0, cannot upgrade");
            return;
        }
        else if (this.upped_res[i] === -1) {
            this.upped_res[i] = 1;
            return;
        }
        else if (this.upped_res[i] >= 23) {
            this.upped_res[i] += 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_res[i]) * 0.15);
        if (up_amount < 1) up_amount = 1;
        this.upped_res[i] += up_amount;
    }
    
    UpgradeStat(i) {
        if (isNaN(i)) {
            PrintError("UpgradeStat: array index is not a number");
            return;
        }
        if (this.upped_stats[i] === 0) {
            PrintError("UpgradeStat: stat value 0, cannot upgrade");
        }
        else if (this.upped_stats[i] === -1) {
            this.upped_stats[i] = 1;
        }
        else this.upped_stats[i] += 1;
    }

    Calculate() {
        this.upped_res = this.resistances.slice();
        this.upped_res = HighestValueFirst(this.upped_res);
        this.upped_stats = this.stats.slice();
        this.ups_on_res = 0;
        let ups_spent = 0;
        let up_count = 0;
        let i = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            i = 0;
            while (i < this.upped_res.length) {
                if (this.upped_res[i] < this.res_target) {
                    if (this.upped_res[i] >= 23 && ((up_count + 2) % 10) !== 0) {
                        i += 1;
                        continue;
                    }
                    this.UpgradeResistance(i);
                    ups_spent += 1;
                    up_count += 1;
                    this.ups_on_res += 1;
                    continue loop;
                }
                i += 1;
            }
            i = 0;
            while (i < this.upped_stats.length) {
                if (this.upped_stats[i] < this.statcap) {
                    this.upped_stats[i] += 1;
                    ups_spent += 1;
                    up_count += 1;
                    continue loop;
                }
                i += 1;
            }
            up_count += 1;
        }
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("armor upgrades calculated");
    }

    GetTotal() {
        if (!this.calculated) this.Calculate();
        return Sum(this.upped_stats);
    }

    GetTotalBonus() {
        if (!this.calculated) this.Calculate();
        let totalbonus = 0;
        for (const stat of this.upped_stats) {
            totalbonus += Math.ceil(stat * this.bonus_multiplier);
        }
        return totalbonus;
    }

    GetUppedStats() {
        if (!this.calculated) this.Calculate();
        return this.upped_stats;
    }

    GetUppedBonus() {
        if (!this.calculated) this.Calculate();
        const statlist = this.upped_stats.slice();
        let bonuslist = [];
        for (const stat of statlist) {
            bonuslist.push(Math.ceil(stat * this.bonus_multiplier));
        }
        return bonuslist;
    }

    GetResBonus() {
        if (!this.calculated) this.Calculate();
        const reslist = this.upped_res.slice();
        let bonuslist = [];
        for (const res of reslist) {
            bonuslist.push(Math.ceil(res * this.bonus_multiplier));
        }
        return bonuslist;
    }
}

function CalculateArmor() {
    ClearLog();
    ClearResult();
    
    if (AllFieldsEmpty()) return;

    const resistances = [];
    const res1 = parseInt(document.getElementById("res1").value);
    if (!isNaN(res1) && res1 !== 0) resistances.push(res1);
    const res2 = parseInt(document.getElementById("res2").value);
    if (!isNaN(res2) && res2 !== 0) resistances.push(res2);
    const res3 = parseInt(document.getElementById("res3").value);
    if (!isNaN(res3) && res3 !== 0) resistances.push(res3);
    const res4 = parseInt(document.getElementById("res4").value);
    if (!isNaN(res4) && res4 !== 0) resistances.push(res4);

    const stats = [];
    const stat1 = parseInt(document.getElementById("stat1").value);
    if (!isNaN(stat1) && stat1 !== 0) stats.push(stat1);
    const stat2 = parseInt(document.getElementById("stat2").value);
    if (!isNaN(stat2) && stat2 !== 0) stats.push(stat2);
    const stat3 = parseInt(document.getElementById("stat3").value);
    if (!isNaN(stat3) && stat3 !== 0) stats.push(stat3);
    const stat4 = parseInt(document.getElementById("stat4").value);
    if (!isNaN(stat4) && stat4 !== 0) stats.push(stat4);

    const ups = parseInt(document.getElementById("upgrades").value);

    const quality = document.getElementById("quality").value;

    const armor = new Armor();
    armor.name = "armor";
    armor.quality = quality;
    armor.resistances = resistances;
    armor.stats = stats;
    armor.upgrades = ups;

    if (!document.getElementById("customres").disabled)
        armor.res_target = document.getElementById("customres").value;
    else armor.res_target = DefaultResTarget(quality);

    armor.statcap = StatCap(quality);
    armor.bonus_multiplier = BonusMultiplier(quality);

    armor.Calculate();

    const total = armor.GetTotal();
    const resbonus = armor.GetResBonus();
    const uppedbonus = armor.GetUppedBonus();
    const bonus = armor.GetTotalBonus();

    let result = "";
    if (armor.ups_on_res > 0)
        result += "<div>Upgrades spent on resistances: " + armor.ups_on_res + "</div>";
    if (armor.upped_res.length > 0) {
        result += "<div>Upgraded resistances: " + armor.upped_res.join(", ") + "</div>";
    }
    if (armor.upped_stats.length > 0) {
        result += "<div>Upgraded stats: " + armor.upped_stats.join(", ") + "</div>";
        result += "<div>Upgraded total: " + total + "</div>";
    }
    if (armor.upped_res.length > 0) {
        result += "<div>Resistances with bonus: " + resbonus.join(", ") + "</div>";
    }
    if (armor.upped_stats.length > 0) {
        result += "<div>Stats with bonus: " + uppedbonus.join(", ") + "</div>";
        result += "<div>Total with bonus: <b>" + bonus + "</b></div>";
    }
    if (armor.spare_ups > 0)
        result += "<div>Upgrades to spare: " + armor.spare_ups + "</div>";

    PrintResult(result);
}

function GetBaseDamagePerUp(obj, ult=false) {
    if (!obj.hasOwnProperty("baseDamagePerUp") || !obj.hasOwnProperty("ultBaseDamagePerUp")) {
        return 0;
    }
    let templateMultiplier = 1;
    let baseMultiplier = 1;
    let displayMultiplier = 1;
    let swingMultiplier = 1;
    let playerMultiplier = 0.8;
    if (obj.hasOwnProperty("templateDamageMultiplier")) {
        templateMultiplier = obj.templateDamageMultiplier;
    }
    if (obj.hasOwnProperty("baseDamageMultiplier")) {
        baseMultiplier = obj.baseDamageMultiplier;
    }
    if (obj.hasOwnProperty("damageDisplayMultiplier")) {
        displayMultiplier = obj.damageDisplayMultiplier;
    }
    if (obj.hasOwnProperty("swingSpeedDamageMultiplier")) {
        swingMultiplier = obj.swingSpeedDamageMultiplier;
    }
    if (obj.hasOwnProperty("playerDamageMultiplier")) {
        playerMultiplier = obj.playerDamageMultiplier;
    }
    let totalMultiplier = templateMultiplier * baseMultiplier * displayMultiplier * swingMultiplier * playerMultiplier;
    if (ult) {
        return Math.floor(obj.ultBaseDamagePerUp) * totalMultiplier;
    }
    else {
        return Math.floor(obj.baseDamagePerUp) * totalMultiplier;
    }
}

function DefaultResTarget(qualityname) {
    /*
     * returns resistance value that's needed to reach resistance cap with set bonus
     * based on provided quality name
     */
    switch (qualityname) {
        case "ultpp":
        case "ultp":
        case "ult":
            return 29;
        case "sup":
            return 30;
        case "trans":
        case "myth":
            return 31;
        case "godly":
        case "any":
            return 33;
        default:
            PrintError("DefaultResTarget: quality name not recognized");
            return 0;
    }
}

function BonusMultiplier(qualityname) {
    /*
     * returns set bonus multiplier based of provided quality name
     */
    switch (qualityname) {
        case "ultpp":
        case "ultp":
        case "ult":
            return 1.4;
        case "sup":
            return 1.36;
        case "trans":
            return 1.33;
        case "myth":
            return 1.3;
        case "godly":
        case "any":
            return 1.25;
        default:
            PrintError("BonusMultiplier: quality name not recognized");
            return 1;
    }
}

function StatCap(qualityname) {
    /*
     * returns stat cap based on provided quality name
     */
    switch (qualityname) {
        case "ultpp":
            return 999;
        case "ultp":
            return 700;
        case "ult":
            return 600;
        case "sup":
            return 500;
        case "trans":
            return 420;
        case "myth":
        case "godly":
        case "any":
            return 360;
        default:
            PrintError("StatCap: quality name not recognized");
            return 0;
    }
}

function Sum(array) {
    /*
     * calculates the sum of every value in an array
     * returns the sum
     */
    let sum = 0;
    for (const element of array) {
        sum += parseInt(element);
    }
    return sum;
}

function HighestValueFirst(array) {
    /*
     * finds the highest value in an array and moves it to the front
     * returns the updated array
     */
    const max = Math.max(...array);
    
    if (array[0] === max) return array;
    
    let spliced = [];
    
    console.log("HighestValueFirst: array before sorting " + array.join());

    for (let i = 0; i < array.length; i++) {
        if (array[i] === max) {
            spliced = array.splice(i, 1);
            array.unshift(spliced[0]);
            break;
        }
    }
    console.log("HighestValueFirst: array after sorting " + array.join());
    return array;
}

}

async function LoadItems() {
    try {
        const result = await fetch("./itemdata.json");
        await result.json().then((value) => {
            ITEMS = value.toSorted((a, b) => a.displayName.localeCompare(b.displayName));
            console.log("LoadItems: itemdata.json loaded");
        });
    }
    catch(error) {
        console.log(error);
        PrintLog("itemdata.json couldn't be loaded, weapon and pet calculations won't function");
    }
}
