<!DOCTYPE html>
<html>
<head>
    
<title>DunDefCalc</title>

<meta charset="UTF-8">

<style>
    
html * {
    font-family: sans-serif;
    font-size: 18px;
    color: black;
}
body {
    background-image: linear-gradient(140deg, #ffffff, #eeeeee);
    background-attachment: fixed;
    background-size: cover;
}
.calculator {
    line-height: 1.8;
    background-color: #ddffdd;
    background-image: linear-gradient(140deg, #f0fff0, #ccffcc);
    background-attachment: fixed;
    background-size: cover;
    width: 600px;
    padding: 10px;
    margin: auto;
    margin-top: 30px;
    border-style: solid;
    border-radius: 10px;
    border-color: #00aa00;
    border-width: 2px;
}
.calculator div {
    margin: auto;
}
.calculator table {
    width: 100%;
}
.select {

}
.subselect {

}
.fields {
    padding-top: 10px;
    padding-bottom: 10px;
    line-height: 2;
}
.fields td {
    height: 36px;
    line-height: 1;
}
.result {
    background-color: #ffffff;
    line-height: 1.5;
    padding: 5px 10px;
}
.log {
    width: 600px;
    background-color: #ffffff;
    padding: 10px;
    margin: auto;
    line-height: 1.5;
}
.logmsg {
    color: black;
}
.errormsg {
    color: red;
}
.about {
    line-height: 1.5;
    background-color: #ffffff;
    padding: 10px;
    font-size: 16px;
}
input[type=text] {
    width: 70px;
    font-size: 16px;
    vertical-align: middle;
    height: 22px;
    border-radius: 4px;
    border-color: #777777;
    border-width: 1px;
}
input[type=checkbox] {
    width: 14px;
    height: 14px;
    vertical-align: middle;
}
input:disabled {
    color: #666666;
    border-color: #dddddd;
    background-color: #f4f4f4;
    border-width: 1px;
}
select {
    font-size: 16px;
    background-color: white;
    height: 24px;
    vertical-align: middle;
    border-radius: 4px;
    margin: 0px;
    padding: 0px;
    padding-left: 3px;
    border-color: #777777;
    border-width: 1px;
}
select:disabled {
    color: #666666;
    border-color: #dddddd;
    background-color: #f4f4f4;
    border-width: 1px;
}
optgroup {
    font-size: 16px;
    font-weight: normal;
    background-color: #eeeeee;
}
option {
    font-size: 16px;
    background-color: white;
}
button {
    font-size: 16px;
    vertical-align: middle;
    height: 24px;
    background-color: #eeeeee;
    background-image: linear-gradient(140deg, #f2f2f2, #e9e9e9);
    border-radius: 4px;
    margin: 0px;
    padding: 0px;
    border-color: #777777;
    border-width: 1px;
}

</style>
</head>
<body>
    
<div class="calculator">
<div class="select">
    <select id="itemtype" onchange="ChangeItemType(this.value)">
        <option value="armor">Armor</option>
        <option value="weapon">Weapon</option>
        <option value="pet">Pet</option>
        <option disabled>---</option>
        <option value="about">About</option>
    </select>
</div>
<div id="subselect" class="subselect"></div>
<div id="fields" class="fields"></div>
<div id="result" class="result"></div>

<br>
<div id="log" class="log"></div>

function ChangeFields(itemname) {
    ClearResult();
    ClearLog();
    
    console.log("ChangeFields: item name " + itemname);

    switch (itemname) {
        case "armor":
            SetFields("armor");
            SetQualities("godly_ultpp");
            break;
        /*
         * APPRENTICE
         */
        case "crystalcane":
        case "enchantedbishop":
        case "lavaslingerrl":
        case "obsidianclava":
        case "staffoffrost":
            SetFields("appmultiprojdualwep");
            SetQualities("sup_ult");
            break;
        case "elderstaff":
        case "embersceptre":
            SetFields("appsingleprojwep");
            SetQualities("sup_ult");
            break;
        case "staffofhearts":
            SetFields("appmultiprojwep");
            SetQualities("sup_ult");
            break;
        /*
         * HUNTRESS
         */
        case "egganator2000":
            SetFields("huntsingleprojwep");
            SetQualities("sup_ult");
            break;
        case "vanwolfsteinrl":
            SetFields("huntmultiprojwep");
            SetQualities("sup_ult");
            break;
        /*
         * MONK
         */
        case "candycane":
        case "embercrescent":
            SetFields("monkmultiprojwep");
            SetQualities("sup_ult");
            break;
        case "eternianspearnm":
            SetFields("monkmeleewep");
            SetQualities("sup_ult");
            break;
        case "madnessboulderthrower":
            SetFields("monktbwep");
            SetQualities("myth_ultpp");
            break;
        case "mischiefmaker":
            SetFields("monksingleprojwep");
            SetQualities("myth_ultpp");
            break;
        /*
         * SQUIRE
         */
        case "calamityblade":
            SetFields("squiresingleprojwep");
            SetQualities("sup_ult");
            break;
        /*
         * DAMAGE PET
         */
        case "cowboymonkey":
        case "littlewizard":
        case "eyeofdestruction":
            SetFields("singleprojpet");
            SetQualities("sup_ult");
            break;
        case "dice":
        case "etherianancient":
        case "mrowl":
            SetFields("meleepet");
            SetQualities("sup_ult");
            break;
        case "emberpony":
            SetFields("multiprojpet");
            SetQualities("any");
            break;
        case "genie":
            SetFields("genie");
            SetQualities("myth_ultpp");
            break;
        case "loverscupid":
        case "zamirasmount":
            SetFields("multiprojpet");
            SetQualities("sup_ult");
            break;
        /*
         * BOOST PET
         */
        case "propellercat":
            SetFields("cat");
            SetQualities("any");
            break;
        /*
         * STAT STICK
         */
        case "diamond":
            SetFields("statstick");
            SetQualities("any");
        case "statstick":
            SetFields("statstick");
            SetQualities("myth_ultpp");
            break;
            break;
        default:
            PrintError("ChangeFields: item name not recognized");
            document.getElementById("fields").innerHTML = "";
            return;
    }
}

function SetQualities(qualityrange) {

class Armor {
    constructor() {
        this.resistances = [];
        this.stats = [];
        this.upgrades = 0;
        this.res_target = 29;
        this.statcap = 999;
        this.bonus_multiplier = 1.4;
        this.ups_on_res = 0;
        this.spare_ups = 0;
        this.upped_res = [];
        this.upped_stats = [];
        this.calculated = false;
    }

    Calculate() {
        this.upped_res = this.resistances.slice();
        this.upped_res = HighestValueFirst(this.upped_res);
        this.upped_stats = this.stats.slice();
        this.ups_on_res = 0;
        let ups_spent = 0;
        let up_count = 0;
        let i = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            i = 0;
            while (i < this.upped_res.length) {
                if (this.upped_res[i] < this.res_target) {
                    if (this.upped_res[i] >= 23 && ((up_count + 2) % 10) !== 0) {
                        i += 1;
                        continue;
                    }
                    this.upped_res[i] = UpgradeRes(this.upped_res[i]);
                    ups_spent += 1;
                    up_count += 1;
                    this.ups_on_res += 1;
                    continue loop;
                }
                i += 1;
            }
            i = 0;
            while (i < this.upped_stats.length) {
                if (this.upped_stats[i] < this.statcap) {
                    this.upped_stats[i] += 1;
                    ups_spent += 1;
                    up_count += 1;
                    continue loop;
                }
                i += 1;
            }
            up_count += 1;
        }
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("armor upgrades calculated");
    }

    GetTotal() {
        if (!this.calculated) this.Calculate();
        return Sum(this.upped_stats);
    }

    GetTotalBonus() {
        if (!this.calculated) this.Calculate();
        let totalbonus = 0;
        for (const stat of this.upped_stats) {
            totalbonus += Math.ceil(stat * this.bonus_multiplier);
        }
        return totalbonus;
    }

    GetUppedStats() {
        if (!this.calculated) this.Calculate();
        return this.upped_stats;
    }

    GetUppedBonus() {
        if (!this.calculated) this.Calculate();
        const statlist = this.upped_stats.slice();
        let bonuslist = [];
        for (const stat of statlist) {
            bonuslist.push(Math.ceil(stat * this.bonus_multiplier));
        }
        return bonuslist;
    }

    GetResBonus() {
        if (!this.calculated) this.Calculate();
        const reslist = this.upped_res.slice();
        let bonuslist = [];
        for (const res of reslist) {
            bonuslist.push(Math.ceil(res * this.bonus_multiplier));
        }
        return bonuslist;
    }
}

        this.knockback = 0;

        this.stat = 0;
        this.priostat = 0;
        this.statcap = 0;
        this.upgrades = 0;
        this.upped_mdamage = 0;
        this.upped_rdamage = 0;
        this.upped_edamage = 0;
        this.upped_rate = 0;
        this.upped_projcount = 0;
        this.upped_projspeed = 0;
        this.upped_charge = 0;
        this.upped_knockback = 0;
        this.upped_stat = 0;
        this.upped_priostat = 0;
        this.spare_ups = 0;
        this.calculated = false;
    }

    Calculate() {
        this.upped_mdamage = this.mdamage;
        this.upped_rdamage = this.rdamage;
        this.upped_edamage = this.edamage;
        this.upped_rate = this.rate;
        this.upped_projcount = this.projcount;
        this.upped_projspeed = this.projspeed;
        this.upped_charge = this.charge;
        this.upped_knockback = this.knockback;
        this.upped_stat = this.stat;
        this.upped_priostat = this.priostat;
        this.spare_ups = 0;
        let ups_spent = 0;
        let up_count = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            if (this.upped_projcount > 0 && this.upped_projcount < this.max_projcount && (up_count + 2) % 5 === 0) {
                this.upped_projcount += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rate > 0 && this.upped_rate < this.max_rate && (up_count + 2) % 4 === 0) {
                this.upped_rate += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_priostat > 0 && this.upped_priostat < this.statcap) {
                this.upped_priostat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_charge !== 0 && this.upped_charge < 128) {
                this.upped_charge = UpgradeCharge(this.upped_charge);
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_knockback !== 0 && this.upped_knockback < this.max_knockback) {
                this.upped_knockback = UpgradeKnockback(this.upped_knockback);
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_projspeed !== 0 && this.upped_projspeed < 30000) {
                this.upped_projspeed = UpgradeProjSpeed(this.upped_projspeed);
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rdamage > 0 && this.upped_edamage > 0) {
                //todo make a separate function to upgrade damage
                if (this.upped_rdamage > this.upped_edamage) {
                    if (this.upped_edamage * 0.16 < this.edamage_per_up) this.upped_edamage *= 1.16;
                    else this.upped_edamage += this.edamage_per_up;
                }
                else {
                    if (this.upped_rdamage * 0.13 < this.rdamage_per_up) this.upped_rdamage *= 1.13;
                    else this.upped_rdamage += this.rdamage_per_up;
                }
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_mdamage > 0 && (this.upped_mdamage < this.mdamage_target || this.mdamage_target === 0)) {
                if (this.upped_mdamage * 0.13 < this.mdamage_per_up) this.upped_mdamage *= 1.13;
                else this.upped_mdamage += this.mdamage_per_up;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rdamage > 0 && (this.upped_rdamage < this.rdamage_target || this.rdamage_target === 0)) {
                if (this.upped_rdamage * 0.13 < this.rdamage_per_up) this.upped_rdamage *= 1.13;
                else this.upped_rdamage += this.rdamage_per_up;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_edamage > 0 && (this.upped_edamage < this.edamage_target || this.edamage_target === 0)) {
                if (this.upped_edamage * 0.16 < this.edamage_per_up) this.upped_edamage *= 1.16;
                else this.upped_edamage += this.edamage_per_up;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_stat > 0 && this.upped_stat < this.statcap) {
                this.upped_stat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            up_count += 1;
        }
        this.upped_mdamage = Math.floor(this.upped_mdamage);
        this.upped_rdamage = Math.floor(this.upped_rdamage);
        this.upped_edamage = Math.floor(this.upped_edamage);
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("weapon upgrades calculated");
    }
}

                i += 1;
            }
            up_count += 1;
        }
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("statstick upgrades calculated");
    }
}

function UpgradeRes(res) {
    /*
     * calculates one upgrade to resistance
     * returns upgraded value
     */
    //todo convert to res *= 1.15
    res = parseInt(res);
    if (res === 0 || isNaN(res)) {
        PrintLog("res value 0, cannot upgrade");
        return NaN;
    }
    if (res >= 23) return res + 1;
    if (res >= 20) return res + 3;
    if (res >= 14) return res + 2;
    if (res >= 1) return res + 1;
    if (res === -1) return 1;
    if (res >= -13) return res + 1;
    if (res >= -19) return res + 2;
    if (res >= -25) return res + 3;
    else return res + 4;
}

function UpsToMaxRes(res) {
    //beautiful
    switch(res) {
        case 23: case 24: case 25: case 26: case 27: case 28: case 29:
            return 29 - res;
        case 20: case 21: case 22:
            return 29 - res - 2;
        case 19:
            return 7;
        case 17: case 18:
            return 8;
        case 15: case 16:
            return 9;
        case 1: case 2: case 3: case 4: case 5: case 6: case 7: case 8:
        case 9: case 10: case 11: case 12: case 13: case 14:
            return 14 - res + 10;
        case 0:
            PrintLog("res value 0, cannot upgrade");
            return 0;
        case -1: case -2: case -3: case -4: case -5: case -6: case -7:
        case -8: case -9: case -10: case -11: case -12:
            return 23 - res;
        case -13: case -14:
            return 36;
        case -15: case -16:
            return 37;
        case -17: case -18:
            return 38;
    }
    PrintLog("res value outside expected range");
    return 0;
}

function UpgradeCharge(charge) {
    /*
     * calculates one upgrade to charge speed
     * returns upgraded value
     */
    if (charge >= 128) {
        PrintError("UpgradeCharge: charge speed over 128, cannot upgrade");
        return charge;
    }
    if (charge === -1) return 1;
    let quarter = Math.floor(Math.abs(charge) * 0.25);
    if (quarter <= 1) quarter = 1;
    if (quarter >= 4) quarter = 4;
    if (charge + quarter >= 128) return 128;
    else return charge + quarter;
}

function UpgradeKnockback(knockback) {
    /*
     * calculates one upgrade to knockback
     * returns upgraded value
     */
    if (knockback >= 128) {
        PrintError("UpgradeKnockback: knockback over 128, cannot upgrade");
        return knockback;
    }
    if (knockback === -1) return 1;
    let quarter = Math.floor(Math.abs(knockback) * 0.25);
    if (quarter <= 1) quarter = 1;
    if (quarter >= 4) quarter = 4;
    if (knockback + quarter >= 128) return 128;
    else return knockback + quarter;
}

function UpgradeProjSpeed(projspeed) {
    /*
     * calculates one upgrade to projectile speed
     * returns upgraded value
     */
    if (projspeed >= 30000) {
        PrintError("UpgradeProjSpeed: projectile speed over 30k, cannot upgrade");
        return projspeed;
    }
    if (projspeed === -100) return 1;
    let quarter = Math.floor(Math.abs(projspeed) * 0.25);
    if (quarter <= 100) return projspeed + 100;
    if (quarter >= 1200) return projspeed + 1200;
    return projspeed + quarter;
}

function UpsToMaxProjSpeed(projspeed) {
    /*
     * returns total number of upgrades needed to reach max projectile speed
     */
    if (projspeed >= 30000) return 0;
    if (projspeed >= 4800) return Math.ceil((30000 - projspeed) / 1200);
    let ups = 0;
    let quarter = 0;
    while (projspeed < 30000) {
        quarter = Math.floor(Math.abs(projspeed) * 0.25);
        if (quarter < 100) quarter = 100;
        if (quarter > 1200) quarter = 1200;
        projspeed += quarter;
        ups += 1;
    }
    return ups;
}

function Sum(array) {
    let sum = 0;
    for (const element of array) {
        sum += parseInt(element);
    }
    return sum;
}

function HighestValueFirst(array) {
    const max = Math.max(...array);
    
    if (array[0] === max) return array;
    
    let spliced = [];
    
    console.log("HighestValueFirst: array before sorting " + array.join());

    for (let i = 0; i < array.length; i++) {
        if (array[i] === max) {
            spliced = array.splice(i, 1);
            array.unshift(spliced[0]);
            break;
        }
    }
    console.log("HighestValueFirst: array after sorting " + array.join());
    return array;
}
