<!DOCTYPE html>
<html>
<head>
    
<title>DunDefCalc</title>

<meta charset="UTF-8">

<style>
    
html * {
    font-family: sans-serif;
    font-size: 18px;
    color: black;
}
body {
    background-image: linear-gradient(140deg, #ffffff, #eeeeee);
    background-attachment: fixed;
    background-size: cover;
}
.calculator {
    line-height: 1.8;
    background-color: #ddffdd;
    background-image: linear-gradient(140deg, #f0fff0, #ccffcc);
    background-attachment: fixed;
    background-size: cover;
    width: 600px;
    padding: 10px;
    margin: auto;
    margin-top: 30px;
    border-style: solid;
    border-radius: 10px;
    border-color: #00aa00;
    border-width: 2px;
}
.calculator div {
    margin: auto;
}
.calculator table {
    width: 100%;
}
.select {

}
.subselect {

}
.fields {
    padding-top: 10px;
    padding-bottom: 10px;
    line-height: 2;
}
.fields td {
    height: 36px;
    line-height: 1;
}
.result {
    background-color: #ffffff;
    line-height: 1.5;
    padding: 5px 10px;
}
.log {
    width: 600px;
    background-color: #ffffff;
    padding: 10px;
    margin: auto;
    line-height: 1.5;
}
.logmsg {
    color: black;
}
.errormsg {
    color: red;
}
.about {
    line-height: 1.5;
    background-color: #ffffff;
    padding: 10px;
    font-size: 16px;
}
input[type=text] {
    width: 70px;
    font-size: 16px;
    vertical-align: middle;
    height: 22px;
    border-radius: 4px;
    border-color: #777777;
    border-width: 1px;
}
input[type=checkbox] {
    width: 14px;
    height: 14px;
    vertical-align: middle;
}
input:disabled {
    color: #666666;
    border-color: #dddddd;
    background-color: #f4f4f4;
    border-width: 1px;
}
select {
    font-size: 16px;
    background-color: white;
    height: 24px;
    vertical-align: middle;
    border-radius: 4px;
    margin: 0px;
    padding: 0px;
    padding-left: 3px;
    padding-right: 18px;
    border-color: #777777;
    border-width: 1px;
    max-width: 200px;
}
select:disabled {
    color: #666666;
    border-color: #dddddd;
    background-color: #f4f4f4;
    border-width: 1px;
}
optgroup {
    font-size: 16px;
    font-weight: normal;
    background-color: #eeeeee;
}
option {
    font-size: 16px;
    background-color: white;
}
button {
    font-size: 16px;
    vertical-align: middle;
    height: 24px;
    background-color: #eeeeee;
    background-image: linear-gradient(140deg, #f2f2f2, #e9e9e9);
    border-radius: 4px;
    margin: 0px;
    padding: 0px;
    border-color: #777777;
    border-width: 1px;
}

</style>
</head>
<body>
    
<div class="calculator">
<div class="select">
    <select id="itemtype" onchange="ChangeItemType(this.value)">
        <option value="armor">Armor</option>
        <option value="weapon">Weapon</option>
        <option value="pet">Pet</option>
        <option disabled>---</option>
        <option value="about">About</option>

</div>
<div id="subselect" class="subselect"></div>
<div id="fields" class="fields"></div>
<div id="result" class="result"></div>

function ChangeFields(itemname) {
    /*
     * calls SetFields and SetQualities functions based on provided item name
     */
    ClearResult();
    ClearLog();
    
    console.log("ChangeFields: item name " + itemname);

    switch (itemname) {
        case "armor":
            SetFields("armor");
            SetQualities("godly_ultpp");
            break;
        /*
         * APPRENTICE
         */
        case "crystalcane":
        case "enchantedbishop":
        case "lavaslingerrl":
        case "staffoffrost":
            SetFields("appmultiprojdualwep");
            SetQualities("sup_ult");
            break;
        case "caneofdoomedrelationships":
        case "elderstaff":
        case "embersceptre":
            SetFields("appsingleprojwep");
            SetQualities("sup_ult");
            break;
        case "obsidianclava":
        case "opticstaff":
            SetFields("appmultiprojdualwep");
            SetQualities("any");
            break;
        case "staffofhearts":
            SetFields("appmultiprojwep");
            SetQualities("any");
            break;
        /*
         * HUNTRESS
         */
        case "egganator2000":
        case "forestrifle":
            SetFields("huntsingleprojwep");
            SetQualities("sup_ult");
            break;
        case "minigun":
            SetFields("huntsingleprojwepnorate");
            SetQualities("sup_ult");
            break;
        case "vanwolfsteinrl":
            SetFields("huntmultiprojwep");
            SetQualities("sup_ult");
            break;
        /*
         * MONK
         */
        case "candycane":
        case "embercrescent":
            SetFields("monkmultiprojwep");
            SetQualities("any");
            break;
        case "eternianspearnm":
            SetFields("monkmeleewep");
            SetQualities("sup_ult");
            break;
        case "madnessboulderthrower":
            SetFields("monktbwep");
            SetQualities("myth_ultpp");
            break;
        case "mischiefmaker":
            SetFields("monkmischief");
            SetQualities("myth_ultpp");
            break;
        case "stickhorse":
        case "turtleshellpolearm":
            SetFields("monkmultiprojwephybrid");
            SetQualities("sup_ult");
            break;
        /*
         * SQUIRE

        case "anubisssandblade":
            SetFields("squiremeleewep");
            SetQualities("any");
            break;
        case "calamityblade":
            SetFields("squiresingleprojwep");
            SetQualities("sup_ult");
            break;
        case "disasterrapier":
            SetFields("squiresingleprojwep");
            SetQualities("any");
            break;
        /*
         * PET

        case "littlewizard":
        case "eyeofdestruction":
        case "eyeofhaste":
            SetFields("singleprojpet");
            SetQualities("sup_ult");
            break;
        case "dice":
        case "etherianancient":
        case "mrowl":
            SetFields("meleepet");
            SetQualities("sup_ult");
            break;
        case "emberpony":

            SetQualities("any");
            break;
        case "eyeoffirestorm":
            SetFields("singleprojpetnorate");
            SetQualities("sup_ult");
            break;
        case "genie":

            SetQualities("myth_ultpp");
            break;
        case "kairithebrave":

            SetQualities("sup_ult");
            break;
        case "loverscupid":
        case "mummy":

            SetQualities("sup_ult");

        case "chainsawcorgi":

class Item {
    /*
     * base class for all items
     * holds common variables and upgrade methods
     */
    constructor() {
        this.itemname = "";
        this.quality = "";
        this.bdamage = 0;
        this.rdamage = 0;
        this.edamage = 0;
        this.bdamage_per_up = 0;
        this.rdamage_per_up = 0;
        this.edamage_per_up = 0;
        this.bdamage_target = 0;
        this.rdamage_target = 0;
        this.edamage_target = 0;
        this.rate = 0;
        this.max_rate = 0;
        this.knockback = 0;
        this.max_knockback = 60;
        this.block = 0;
        this.max_block = 96;
        this.charge = 0;
        this.max_charge = 128;
        this.charge_target = 0;
        this.projcount = 0;
        this.max_projcount = 0;
        this.projspeed = 0;
        this.max_projspeed = 30000;
        this.stat = 0;
        this.priostat = 0;
        this.statcap = 999;
        this.upgrades = 0;
        this.upped_bdamage = 0;
        this.upped_rdamage = 0;
        this.upped_edamage = 0;
        this.upped_rate = 0;
        this.upped_block = 0;
        this.upped_projcount = 0;
        this.upped_projspeed = 0;
        this.upped_charge = 0;
        this.upped_knockback = 0;
        this.upped_stat = 0;
        this.upped_priostat = 0;
        this.spare_ups = 0;
        this.calculated = false;
    }
    
    UpgradeBaseDamage() {
        let up_amount = 0;
        if (this.upped_bdamage * 0.15 < this.bdamage_per_up) up_amount = Math.round(this.upped_bdamage * 0.15);
        else {
            this.upped_bdamage += this.bdamage_per_up;
            return;
        }
        if (up_amount < 1) this.upped_bdamage += 1;
        else this.upped_bdamage += up_amount;
    }
    
    UpgradeRangedDamage() {
        let up_amount = 0;
        if (this.upped_rdamage * 0.13 < this.rdamage_per_up) up_amount = Math.round(this.upped_rdamage * 0.13);
        else {
            this.upped_rdamage += this.rdamage_per_up;
            return;
        }
        if (up_amount < 1) this.upped_rdamage += 1;
        else this.upped_rdamage += up_amount;
    }
    
    UpgradeElemDamage() {
        let up_amount = 0;
        if (this.upped_edamage * 0.16 < this.edamage_per_up) up_amount = Math.round(this.upped_edamage * 0.16);
        else {
            this.upped_edamage += this.edamage_per_up;
            return;
        }
        if (up_amount < 1) this.upped_edamage += 1;
        else this.upped_edamage += up_amount;
    }
    
    UpgradeCharge() {
        if (this.upped_charge >= 128) {
            PrintError("UpgradeCharge: charge speed over 128, cannot upgrade");
            return;
        }
        else if (this.upped_charge === 0) {
            PrintError("UpgradeCharge: charge speed 0, cannot upgrade");
            return;
        }
        else if (this.upped_charge === -1) {
            this.upped_charge = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_charge) * 0.25);
        if (up_amount <= 1) up_amount = 1;
        else if (up_amount >= 4) up_amount = 4;
        if (this.upped_charge + up_amount >= 128) this.upped_charge = 128;
        else this.upped_charge += up_amount;
    }
    
    UpgradeBlock() {
        if (this.upped_block === 0) {
            PrintError("UpgradeBlock: block value 0, cannot upgrade");
            return;
        }
        else if (this.upped_block === -5) {
            this.upped_block = 1;
            return;
        }
        this.upped_block += 5;
    }
    
    UpgradeKnockback() {
        if (this.upped_knockback >= 128) {
            PrintError("UpgradeKnockback: knockback over 128, cannot upgrade");
            return;
        }
        else if (this.upped_knockback === 0) {
            PrintError("UpgradeKnockback: knockback 0, cannot upgrade");
            return;
        }
        else if (this.upped_knockback === -1) {
            this.upped_knockback = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_knockback) * 0.25);
        if (up_amount <= 1) up_amount = 1;
        else if (up_amount >= 4) up_amount = 4;
        if (this.upped_knockback + up_amount >= 128) this.upped_knockback = 128;
        else this.upped_knockback += up_amount;
    }
    
    UpgradeProjSpeed() {
        if (this.upped_projspeed === 0) {
            PrintError("UpgradeProjSpeed: projectile speed 0, cannot upgrade");
            return;
        }
        else if (this.upped_projspeed === -100) {
            this.upped_projspeed = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_projspeed) * 0.25);
        if (up_amount <= 100) this.upped_projspeed += 100;
        else if (up_amount >= 1200) this.upped_projspeed += 1200;
        else this.upped_projspeed += up_amount;
    }
    
    UpgradePrioStat() {
        if (this.upped_priostat === 0) PrintError("UpgradePrioStat: stat value 0, cannot upgrade");
        else if (this.upped_priostat === -1) this.upped_priostat = 1;
        else this.upped_priostat += 1;
    }
    
    UpgradeStat() {
        if (this.upped_stat === 0) PrintError("UpgradeStat: stat value 0, cannot upgrade");
        else if (this.upped_stat === -1) this.upped_stat = 1;
        else this.upped_stat += 1;
    }
}

class Armor extends Item {
    constructor() {
        super();
        this.resistances = [];
        this.stats = [];
        this.res_target = 29;
        this.bonus_multiplier = 1.4;
        this.ups_on_res = 0;
        this.upped_res = [];
        this.upped_stats = [];
    }
    
    UpgradeResistance(i) {
        if (isNaN(i)) {
            PrintError("UpgradeResistance: array index is not a number");
            return;
        }
        if (this.upped_res[i] === 0) {
            PrintError("UpgradeResistance: resistance value 0, cannot upgrade");
            return;
        }
        else if (this.upped_res[i] === -1) {
            this.upped_res[i] = 1;
            return;
        }
        else if (this.upped_res[i] >= 23) {
            this.upped_res[i] += 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_res[i]) * 0.15);
        if (up_amount < 1) up_amount = 1;
        this.upped_res[i] += up_amount;
    }
    
    UpgradeStat(i) {
        if (isNaN(i)) {
            PrintError("UpgradeStat: array index is not a number");
            return;
        }
        if (this.upped_stats[i] === 0) {
            PrintError("UpgradeStat: stat value 0, cannot upgrade");
        }
        else if (this.upped_stats[i] === -1) {
            this.upped_stats[i] = 1;
        }
        else this.upped_stats[i] += 1;
    }

    Calculate() {
        this.upped_res = this.resistances.slice();
        this.upped_res = HighestValueFirst(this.upped_res);
        this.upped_stats = this.stats.slice();
        this.ups_on_res = 0;
        let ups_spent = 0;
        let up_count = 0;
        let i = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            i = 0;
            while (i < this.upped_res.length) {
                if (this.upped_res[i] < this.res_target) {
                    if (this.upped_res[i] >= 23 && ((up_count + 2) % 10) !== 0) {
                        i += 1;
                        continue;
                    }
                    this.UpgradeResistance(i);
                    ups_spent += 1;
                    up_count += 1;
                    this.ups_on_res += 1;
                    continue loop;
                }
                i += 1;
            }
            i = 0;
            while (i < this.upped_stats.length) {
                if (this.upped_stats[i] < this.statcap) {
                    this.upped_stats[i] += 1;
                    ups_spent += 1;
                    up_count += 1;
                    continue loop;
                }
                i += 1;
            }
            up_count += 1;
        }
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("armor upgrades calculated");
    }

    GetTotal() {
        if (!this.calculated) this.Calculate();
        return Sum(this.upped_stats);
    }

    GetTotalBonus() {
        if (!this.calculated) this.Calculate();
        let totalbonus = 0;
        for (const stat of this.upped_stats) {
            totalbonus += Math.ceil(stat * this.bonus_multiplier);
        }
        return totalbonus;
    }

    GetUppedStats() {
        if (!this.calculated) this.Calculate();
        return this.upped_stats;
    }

    GetUppedBonus() {
        if (!this.calculated) this.Calculate();
        const statlist = this.upped_stats.slice();
        let bonuslist = [];
        for (const stat of statlist) {
            bonuslist.push(Math.ceil(stat * this.bonus_multiplier));
        }
        return bonuslist;
    }

    GetResBonus() {
        if (!this.calculated) this.Calculate();
        const reslist = this.upped_res.slice();
        let bonuslist = [];
        for (const res of reslist) {
            bonuslist.push(Math.ceil(res * this.bonus_multiplier));
        }
        return bonuslist;
    }
}

class Weapon extends Item {
    constructor() {
        super();
    }

    Calculate() {
        this.upped_bdamage = this.bdamage;
        this.upped_rdamage = this.rdamage;
        this.upped_edamage = this.edamage;
        this.upped_rate = this.rate;
        this.upped_block = this.block;
        this.upped_projcount = this.projcount;
        this.upped_projspeed = this.projspeed;
        this.upped_charge = this.charge;
        this.upped_knockback = this.knockback;
        this.upped_stat = this.stat;
        this.upped_priostat = this.priostat;
        this.spare_ups = 0;
        let ups_spent = 0;
        let up_count = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            if (this.upped_projcount > 0 && this.upped_projcount < this.max_projcount && (up_count + 2) % 5 === 0) {
                this.upped_projcount += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rate > 0 && this.upped_rate < this.max_rate && (up_count + 2) % 4 === 0) {
                this.upped_rate += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_priostat > 0 && this.upped_priostat < this.statcap) {
                this.upped_priostat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_charge !== 0 && this.upped_charge < this.max_charge && (this.upped_charge < this.charge_target || this.charge_target === 0)) {
                this.UpgradeCharge();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_block !== 0 && this.upped_block < this.max_block) {
                this.UpgradeBlock();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_knockback !== 0 && this.upped_knockback < this.max_knockback) {
                this.UpgradeKnockback();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_projspeed !== 0 && this.upped_projspeed < this.max_projspeed) {
                this.UpgradeProjSpeed();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_bdamage > 0 && this.upped_edamage > 0) {
                if (this.upped_bdamage > this.upped_edamage)
                    this.UpgradeElemDamage();
                else
                    this.UpgradeBaseDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_bdamage > 0 && (this.upped_bdamage < this.bdamage_target || this.bdamage_target === 0)) {
                this.UpgradeBaseDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rdamage > 0 && (this.upped_rdamage < this.rdamage_target || this.rdamage_target === 0)) {
                this.UpgradeRangedDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_edamage > 0 && (this.upped_edamage < this.edamage_target || this.edamage_target === 0)) {
                this.UpgradeElemDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_stat > 0 && this.upped_stat < this.statcap) {
                this.upped_stat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            up_count += 1;
        }
        this.upped_bdamage = Math.round(this.upped_bdamage);
        this.upped_rdamage = Math.round(this.upped_rdamage);
        this.upped_edamage = Math.round(this.upped_edamage);
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("weapon upgrades calculated");
    }
}

    PrintResult(result);
}

function Sum(array) {
    /*
     * calculates the sum of every value in an array
     * returns the sum
     */
    let sum = 0;
    for (const element of array) {
        sum += parseInt(element);
    }
    return sum;
}

function HighestValueFirst(array) {
    /*
     * finds the highest value in an array and moves it to the front
     * returns the updated array
     */
    const max = Math.max(...array);
    
    if (array[0] === max) return array;
    
    let spliced = [];
    
    console.log("HighestValueFirst: array before sorting " + array.join());

    for (let i = 0; i < array.length; i++) {
        if (array[i] === max) {
            spliced = array.splice(i, 1);
            array.unshift(spliced[0]);
            break;
        }
    }
    console.log("HighestValueFirst: array after sorting " + array.join());
    return array;
}
