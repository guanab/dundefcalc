<head>
    
<title>DunDefCalc</title>

html * {

body {

}
.calculator {

    border-width: 2px;
}
.calculator div {
    margin: auto;
}
.calculator table {
    width: 100%;
}
.select {

}
.subselect {

}
.fields {
    padding-top: 10px;
    padding-bottom: 10px;

}
.fields td {

}
.result {
    background-color: #ffffff;

    padding: 5px 10px;
}

    padding: 10px;
    margin: auto;

}

}
.about {

    padding: 10px;
    font-size: 16px;
}
.searchbox {
    display: inline-block;

.searchbox input {

}
.searchresults {

    max-height: 300px;
    overflow-y: scroll;
    overflow-x: hidden;

.searchresults button {

    border-width: 0px;

.searchresults button:hover {

input[type=text] {

input[type=checkbox] {

<script>

function ChangeItemType(itemtype) {
    /*
     * prints html content on the subselect div based on provided item type
     */
    ClearResult();
    ClearLog();
    
    console.log("ChangeItemType: item type " + itemtype);
    
    let htmlstring = "";

    switch (itemtype) {
        case "armor":
            document.getElementById("subselect").innerHTML = '\
<select id="quality" onchange="ChangeResTarget(this.value)">\n\
</select><div style="float:right;padding-right:8px">\n\
Custom res target<input type="checkbox" onchange="ChangeCustomRes(this.checked)">\n\
<input id="customres" type="text" value="29" disabled></div>';
            ChangeFields("armor");
            break;
        case "weapon":
            htmlstring += '<select id="itemname" onchange="ChangeFields(this.value)">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "any")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '<optgroup label="Apprentice">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "apprentice")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup><optgroup label="Huntress">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "huntress")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup><optgroup label="Monk">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "monk")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup><optgroup label="Squire">\n';
            for (const obj of ITEMS.filter(obj => obj.hero === "squire")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</optgroup></select>\n';
            htmlstring += '<select id="quality"></select>\n';
            
            document.getElementById("subselect").innerHTML = htmlstring;
            
            ChangeFields(document.getElementById("itemname").value);
            break;
        case "pet":
            htmlstring += '<select id="itemname" onchange="ChangeFields(this.value)">\n';
            for (const obj of ITEMS.filter(obj => obj.type === "pet")) {
                htmlstring += '<option value="' + obj.name + '">' + obj.displayName + '</option>\n';
            }
            htmlstring += '</select>\n';
            htmlstring += '<select id="quality"></select>\n';
            
            document.getElementById("subselect").innerHTML = htmlstring;
            
            ChangeFields(document.getElementById("itemname").value);
            break;
        case "about":
            SetFields("about");
            document.getElementById("subselect").innerHTML = "";
            break;
        default:
            PrintError("ChangeItemType: item type not recognized");
            document.getElementById("subselect").innerHTML = "";
            document.getElementById("fields").innerHTML = "";
            return;
    }
}

function ChangeFields(itemname) {
    /*
     * calls SetFields and SetQualities functions based on provided item name
     */
    ClearResult();
    ClearLog();
    
    console.log("ChangeFields: item name " + itemname);
    
    if (itemname === "armor") {
        SetFields("armor");
        SetQualities("godly_ultpp");
        return;
    }
    
    const obj = ITEMS.find(obj => obj.name === itemname);
    
    const nolayout = "no suitable layout found";
    
    //todo write something more elegant :fridge:
    if (obj.hasOwnProperty("overrideLayout")) SetFields(obj.overrideLayout);
    else if (obj.type === "weapon") {
        if (obj.hero === "apprentice") {
            if (obj.hasOwnProperty("maxProjCount")) {
                if (obj.hasOwnProperty("baseDamagePerUp") && obj.hasOwnProperty("elemDamagePerUp"))
                    SetFields("appmultiprojdualwep");
                else if (obj.hasOwnProperty("baseDamagePerUp"))
                    SetFields("appmultiprojwep");
                else PrintLog(nolayout);
            }
            else {
                if (obj.hasOwnProperty("baseDamagePerUp") && obj.hasOwnProperty("elemDamagePerUp"))
                    PrintLog(nolayout);
                else if (obj.hasOwnProperty("baseDamagePerUp"))
                    SetFields("appsingleprojwep");
                else PrintLog(nolayout);
            }
        }
        else if (obj.hero === "huntress") {
            if (obj.hasOwnProperty("maxProjCount")) {
                if (obj.hasOwnProperty("maxRate")) SetFields("huntmultiprojwep");
                else PrintLog(nolayout);
            }
            else {
                if (obj.hasOwnProperty("maxRate")) SetFields("huntsingleprojwep");
                else SetFields("huntsingleprojwepnorate");
            }
        }
        else if (obj.hero === "monk") {
            if (obj.hasOwnProperty("baseDamagePerUp")) {
                if (obj.hasOwnProperty("rangedDamagePerUp")) {
                    if (obj.hasOwnProperty("maxProjCount"))
                        SetFields("monkmultiprojwephybrid");
                    else PrintLog(nolayout);
                }
                else SetFields("monkmeleewep");
            }
            else if (obj.hasOwnProperty("rangedDamagePerUp")) {
                if (obj.hasOwnProperty("maxProjCount"))
                    SetFields("monkmultiprojwep");
                else PrintLog(nolayout);
            }
            else PrintLog(nolayout);
        }
        else if (obj.hero === "squire") {
            if (obj.hasOwnProperty("maxProjSpeed")) SetFields("squiresingleprojwep");
            else SetFields("squiremeleewep");
        }
        else PrintLog(nolayout);
    }
    else if (obj.type === "pet") {
        if (obj.hasOwnProperty("maxProjCount")) {
            SetFields("multiprojpet");
        }
        else {
            if (obj.hasOwnProperty("maxProjSpeed")) {
                if (obj.hasOwnProperty("maxRate")) SetFields("singleprojpet");
                else SetFields("singleprojpetnorate");
            }
            else {
                if (obj.hasOwnProperty("maxKnockback")) SetFields("meleepet");
                else SetFields("meleepetnoknockback");
            }
        }
    }
    else {
        PrintError("ChangeFields: item not recognized");
    }
    
    if (obj.hasOwnProperty("overrideQualityRange")) SetQualities(obj.overrideQualityRange);
    else if (obj.hasOwnProperty("ultBaseDamagePerUp")) SetQualities("sup_ult");
    else SetQualities("any");
}

function SetUpgradeValues(item, itemname, quality) {
    /*
     * sets upgrade values into a provided instance of Item class
     * todo move this stuff into an xml/json file along with a parser
     */
    for (const obj of ITEMS) {
        if (itemname === obj.name) {
            if (quality.includes("ult") && obj.hasOwnProperty("ultBaseDamagePerUp")) item.bdamage_per_up = obj.ultBaseDamagePerUp;
            else if (obj.hasOwnProperty("baseDamagePerUp")) item.bdamage_per_up = obj.baseDamagePerUp;
            if (obj.hasOwnProperty("rangedDamagePerUp")) item.rdamage_per_up = obj.rangedDamagePerUp;
            if (obj.hasOwnProperty("elemDamagePerUp")) item.edamage_per_up = obj.elemDamagePerUp;
            if (obj.hasOwnProperty("maxRate")) item.max_rate = obj.maxRate;
            if (obj.hasOwnProperty("maxKnockback")) item.max_knockback = obj.maxKnockback;
            if (obj.hasOwnProperty("maxProjCount")) item.max_projcount = obj.maxProjCount;
            if (obj.hasOwnProperty("maxProjSpeed")) item.max_projspeed = obj.maxProjSpeed;
            if (obj.hasOwnProperty("maxBoost")) item.max_boost = obj.maxBoost;
            if (obj.hasOwnProperty("maxRange")) item.max_range = obj.maxRange;
            if (obj.hasOwnProperty("maxTargets")) item.max_targets = obj.maxTargets;

            return true;
        }
    }
    return false;

function SearchItems() {
    const searchstring = document.getElementById("searchbox").value.toUpperCase();
    
    if (searchstring === "") {
        HideSearch();
        return;
    }
    ShowSearch();
    
    const sorteditems = ITEMS.toSorted((a, b) => a.displayName.localeCompare(b.displayName));
    
    let htmlstring = "";
    let resultcount = 0;
    
    for (const obj of sorteditems) {
        if (obj.displayName.toUpperCase().includes(searchstring)) {
            htmlstring += '<div><button value="' + obj.name + '" onclick="SelectSearchResult(this.value)">' + obj.displayName + '</button></div>\n';
            resultcount += 1;
        }
    }
    
    if (resultcount > 10) document.getElementById("searchresults").style.overflowY = "scroll";
    else document.getElementById("searchresults").style.overflowY = "hidden";
    
    document.getElementById("searchresults").innerHTML = htmlstring;
}

class Item {
    /*
     * base class for all items
     * holds common variables and upgrade methods
     */
    constructor() {
        this.itemname = "";
        this.quality = "";
        this.bdamage = 0;
        this.rdamage = 0;
        this.edamage = 0;
        this.bdamage_per_up = 0;
        this.rdamage_per_up = 0;
        this.edamage_per_up = 0;
        this.bdamage_target = 0;
        this.rdamage_target = 0;
        this.edamage_target = 0;
        this.rate = 0;
        this.max_rate = 0;
        this.knockback = 0;
        this.max_knockback = 60;
        this.block = 0;
        this.max_block = 96;
        this.charge = 0;
        this.max_charge = 128;
        this.charge_target = 0;
        this.projcount = 0;
        this.max_projcount = 0;
        this.projspeed = 0;
        this.max_projspeed = 30000;
        this.stat = 0;
        this.priostat = 0;
        this.statcap = 999;
        this.upgrades = 0;
        this.upped_bdamage = 0;
        this.upped_rdamage = 0;
        this.upped_edamage = 0;
        this.upped_rate = 0;
        this.upped_block = 0;
        this.upped_projcount = 0;
        this.upped_projspeed = 0;
        this.upped_charge = 0;
        this.upped_knockback = 0;
        this.upped_stat = 0;
        this.upped_priostat = 0;
        this.spare_ups = 0;
        this.calculated = false;
    }
    
    UpgradeBaseDamage() {
        let up_amount = 0;
        if (this.upped_bdamage * 0.15 < this.bdamage_per_up) up_amount = Math.round(this.upped_bdamage * 0.15);
        else {
            this.upped_bdamage += this.bdamage_per_up;
            return;
        }
        if (up_amount < 1) this.upped_bdamage += 1;
        else this.upped_bdamage += up_amount;
    }
    
    UpgradeRangedDamage() {
        let up_amount = 0;
        if (this.upped_rdamage * 0.13 < this.rdamage_per_up) up_amount = Math.round(this.upped_rdamage * 0.13);
        else {
            this.upped_rdamage += this.rdamage_per_up;
            return;
        }
        if (up_amount < 1) this.upped_rdamage += 1;
        else this.upped_rdamage += up_amount;
    }
    
    UpgradeElemDamage() {
        let up_amount = 0;
        if (this.upped_edamage * 0.16 < this.edamage_per_up) up_amount = Math.round(this.upped_edamage * 0.16);
        else {
            this.upped_edamage += this.edamage_per_up;
            return;
        }
        if (up_amount < 1) this.upped_edamage += 1;
        else this.upped_edamage += up_amount;
    }
    
    UpgradeCharge() {
        if (this.upped_charge >= 128) {
            PrintError("UpgradeCharge: charge speed over 128, cannot upgrade");
            return;
        }
        else if (this.upped_charge === 0) {
            PrintError("UpgradeCharge: charge speed 0, cannot upgrade");
            return;
        }
        else if (this.upped_charge === -1) {
            this.upped_charge = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_charge) * 0.25);
        if (up_amount <= 1) up_amount = 1;
        else if (up_amount >= 4) up_amount = 4;
        if (this.upped_charge + up_amount >= 128) this.upped_charge = 128;
        else this.upped_charge += up_amount;
    }
    
    UpgradeBlock() {
        if (this.upped_block === 0) {
            PrintError("UpgradeBlock: block value 0, cannot upgrade");
            return;
        }
        else if (this.upped_block === -5) {
            this.upped_block = 1;
            return;
        }
        this.upped_block += 5;
    }
    
    UpgradeKnockback() {
        if (this.upped_knockback >= 128) {
            PrintError("UpgradeKnockback: knockback over 128, cannot upgrade");
            return;
        }
        else if (this.upped_knockback === 0) {
            PrintError("UpgradeKnockback: knockback 0, cannot upgrade");
            return;
        }
        else if (this.upped_knockback === -1) {
            this.upped_knockback = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_knockback) * 0.25);
        if (up_amount <= 1) up_amount = 1;
        else if (up_amount >= 4) up_amount = 4;
        if (this.upped_knockback + up_amount >= 128) this.upped_knockback = 128;
        else this.upped_knockback += up_amount;
    }
    
    UpgradeProjSpeed() {
        if (this.upped_projspeed === 0) {
            PrintError("UpgradeProjSpeed: projectile speed 0, cannot upgrade");
            return;
        }
        else if (this.upped_projspeed === -100) {
            this.upped_projspeed = 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_projspeed) * 0.25);
        if (up_amount <= 100) this.upped_projspeed += 100;
        else if (up_amount >= 1200) this.upped_projspeed += 1200;
        else this.upped_projspeed += up_amount;
    }
    
    UpgradePrioStat() {
        if (this.upped_priostat === 0) PrintError("UpgradePrioStat: stat value 0, cannot upgrade");
        else if (this.upped_priostat === -1) this.upped_priostat = 1;
        else this.upped_priostat += 1;
    }
    
    UpgradeStat() {
        if (this.upped_stat === 0) PrintError("UpgradeStat: stat value 0, cannot upgrade");
        else if (this.upped_stat === -1) this.upped_stat = 1;
        else this.upped_stat += 1;
    }
}

class Armor extends Item {
    constructor() {
        super();
        this.resistances = [];
        this.stats = [];
        this.res_target = 29;
        this.bonus_multiplier = 1.4;
        this.ups_on_res = 0;
        this.upped_res = [];
        this.upped_stats = [];
    }
    
    UpgradeResistance(i) {
        if (isNaN(i)) {
            PrintError("UpgradeResistance: array index is not a number");
            return;
        }
        if (this.upped_res[i] === 0) {
            PrintError("UpgradeResistance: resistance value 0, cannot upgrade");
            return;
        }
        else if (this.upped_res[i] === -1) {
            this.upped_res[i] = 1;
            return;
        }
        else if (this.upped_res[i] >= 23) {
            this.upped_res[i] += 1;
            return;
        }
        let up_amount = Math.floor(Math.abs(this.upped_res[i]) * 0.15);
        if (up_amount < 1) up_amount = 1;
        this.upped_res[i] += up_amount;
    }
    
    UpgradeStat(i) {
        if (isNaN(i)) {
            PrintError("UpgradeStat: array index is not a number");
            return;
        }
        if (this.upped_stats[i] === 0) {
            PrintError("UpgradeStat: stat value 0, cannot upgrade");
        }
        else if (this.upped_stats[i] === -1) {
            this.upped_stats[i] = 1;
        }
        else this.upped_stats[i] += 1;
    }

    Calculate() {
        this.upped_res = this.resistances.slice();
        this.upped_res = HighestValueFirst(this.upped_res);
        this.upped_stats = this.stats.slice();
        this.ups_on_res = 0;
        let ups_spent = 0;
        let up_count = 0;
        let i = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            i = 0;
            while (i < this.upped_res.length) {
                if (this.upped_res[i] < this.res_target) {
                    if (this.upped_res[i] >= 23 && ((up_count + 2) % 10) !== 0) {
                        i += 1;
                        continue;
                    }
                    this.UpgradeResistance(i);
                    ups_spent += 1;
                    up_count += 1;
                    this.ups_on_res += 1;
                    continue loop;
                }
                i += 1;
            }
            i = 0;
            while (i < this.upped_stats.length) {
                if (this.upped_stats[i] < this.statcap) {
                    this.upped_stats[i] += 1;
                    ups_spent += 1;
                    up_count += 1;
                    continue loop;
                }
                i += 1;
            }
            up_count += 1;
        }
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("armor upgrades calculated");
    }

    GetTotal() {
        if (!this.calculated) this.Calculate();
        return Sum(this.upped_stats);
    }

    GetTotalBonus() {
        if (!this.calculated) this.Calculate();
        let totalbonus = 0;
        for (const stat of this.upped_stats) {
            totalbonus += Math.ceil(stat * this.bonus_multiplier);
        }
        return totalbonus;
    }

    GetUppedStats() {
        if (!this.calculated) this.Calculate();
        return this.upped_stats;
    }

    GetUppedBonus() {
        if (!this.calculated) this.Calculate();
        const statlist = this.upped_stats.slice();
        let bonuslist = [];
        for (const stat of statlist) {
            bonuslist.push(Math.ceil(stat * this.bonus_multiplier));
        }
        return bonuslist;
    }

    GetResBonus() {
        if (!this.calculated) this.Calculate();
        const reslist = this.upped_res.slice();
        let bonuslist = [];
        for (const res of reslist) {
            bonuslist.push(Math.ceil(res * this.bonus_multiplier));
        }
        return bonuslist;
    }
}

class Weapon extends Item {
    constructor() {
        super();
    }

    Calculate() {
        this.upped_bdamage = this.bdamage;
        this.upped_rdamage = this.rdamage;
        this.upped_edamage = this.edamage;
        this.upped_rate = this.rate;
        this.upped_block = this.block;
        this.upped_projcount = this.projcount;
        this.upped_projspeed = this.projspeed;
        this.upped_charge = this.charge;
        this.upped_knockback = this.knockback;
        this.upped_stat = this.stat;
        this.upped_priostat = this.priostat;
        this.spare_ups = 0;
        let ups_spent = 0;
        let up_count = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            if (this.upped_projcount > 0 && this.upped_projcount < this.max_projcount && (up_count + 2) % 5 === 0) {
                this.upped_projcount += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rate > 0 && this.upped_rate < this.max_rate && (up_count + 2) % 4 === 0) {
                this.upped_rate += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_priostat > 0 && this.upped_priostat < this.statcap) {
                this.upped_priostat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_charge !== 0 && this.upped_charge < this.max_charge && (this.upped_charge < this.charge_target || this.charge_target === 0)) {
                this.UpgradeCharge();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_block !== 0 && this.upped_block < this.max_block) {
                this.UpgradeBlock();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_knockback !== 0 && this.upped_knockback < this.max_knockback) {
                this.UpgradeKnockback();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_projspeed !== 0 && this.upped_projspeed < this.max_projspeed) {
                this.UpgradeProjSpeed();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_bdamage > 0 && this.upped_edamage > 0) {
                if (this.upped_bdamage > this.upped_edamage)
                    this.UpgradeElemDamage();
                else
                    this.UpgradeBaseDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_bdamage > 0 && (this.upped_bdamage < this.bdamage_target || this.bdamage_target === 0)) {
                this.UpgradeBaseDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rdamage > 0 && (this.upped_rdamage < this.rdamage_target || this.rdamage_target === 0)) {
                this.UpgradeRangedDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_edamage > 0 && (this.upped_edamage < this.edamage_target || this.edamage_target === 0)) {
                this.UpgradeElemDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_stat > 0 && this.upped_stat < this.statcap) {
                this.upped_stat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            up_count += 1;
        }
        this.upped_bdamage = Math.round(this.upped_bdamage);
        this.upped_rdamage = Math.round(this.upped_rdamage);
        this.upped_edamage = Math.round(this.upped_edamage);
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("weapon upgrades calculated");
    }
}

        while (up_count < this.upgrades - 1) {
            if (this.upped_targets > 0 && this.upped_targets < this.max_targets && (up_count + 2) % 30 === 0) {
                this.upped_targets += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_boost > 0 && (up_count + 2) % 3 === 0) {
                this.upped_boost += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_range > 0 && this.upped_range < this.max_range && (up_count + 2) % 5 === 0) {
                this.upped_range += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_projcount > 0 && this.upped_projcount < this.max_projcount && (up_count + 2) % 5 === 0) {
                this.upped_projcount += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_rate > 0 && this.upped_rate < this.max_rate && (up_count + 2) % 4 === 0) {
                this.upped_rate += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_projspeed !== 0 && this.upped_projspeed < this.max_projspeed) {
                this.UpgradeProjSpeed();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_knockback !== 0 && this.upped_knockback < this.max_knockback) {
                this.UpgradeKnockback();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_bdamage > 0 && (this.upped_bdamage < this.bdamage_target || this.bdamage_target === 0)) {
                this.UpgradeBaseDamage();
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            if (this.upped_stat > 0 && this.upped_stat < this.statcap) {
                this.upped_stat += 1;
                ups_spent += 1;
                up_count += 1;
                continue loop;
            }
            up_count += 1;
        }
        this.upped_bdamage = Math.round(this.upped_bdamage);
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("pet upgrades calculated");
    }
}

class StatStick extends Item {
    constructor() {
        super();
        this.stats = [];
        this.upped_stats = [];
    }

    Calculate() {
        this.upped_stats = this.stats.slice();
        this.spare_ups = 0;
        let ups_spent = 0;
        let up_count = 0;
        let i = 0;
        loop:
        while (up_count < this.upgrades - 1) {
            i = 0;
            while (i < this.upped_stats.length) {
                if (this.upped_stats[i] < this.statcap) {
                    this.upped_stats[i] += 1;
                    ups_spent += 1;
                    up_count += 1;
                    continue loop;
                }
                i += 1;
            }
            up_count += 1;
        }
        if (ups_spent < this.upgrades - 1) this.spare_ups = this.upgrades - ups_spent - 1;
        this.calculated = true;
        console.log("statstick upgrades calculated");
    }
}

function DefaultResTarget(qualityname) {
    /*
     * returns resistance value that's needed to reach resistance cap with set bonus
     * based on provided quality name
     */
    switch (qualityname) {
        case "ultpp":
        case "ultp":
        case "ult":
            return 29;
        case "sup":
            return 30;
        case "trans":
        case "myth":
            return 31;
        case "godly":
        case "any":
            return 33;
        default:
            PrintError("DefaultResTarget: quality name not recognized");
            return 0;
    }
}

function BonusMultiplier(qualityname) {
    /*
     * returns set bonus multiplier based of provided quality name
     */
    switch (qualityname) {
        case "ultpp":
        case "ultp":
        case "ult":
            return 1.4;
        case "sup":
            return 1.36;
        case "trans":
            return 1.33;
        case "myth":
            return 1.3;
        case "godly":
        case "any":
            return 1.25;
        default:
            PrintError("BonusMultiplier: quality name not recognized");
            return 1;
    }
}

function StatCap(qualityname) {
    /*
     * returns stat cap based on provided quality name
     */
    switch (qualityname) {
        case "ultpp":
            return 999;
        case "ultp":
            return 700;
        case "ult":
            return 600;
        case "sup":
            return 500;
        case "trans":
            return 420;
        case "myth":
        case "godly":
        case "any":
            return 360;
        default:
            PrintError("StatCap: quality name not recognized");
            return 0;
    }
}

function Sum(array) {
    /*
     * calculates the sum of every value in an array
     * returns the sum
     */
    let sum = 0;
    for (const element of array) {
        sum += parseInt(element);
    }
    return sum;
}

function HighestValueFirst(array) {
    /*
     * finds the highest value in an array and moves it to the front
     * returns the updated array
     */
    const max = Math.max(...array);
    
    if (array[0] === max) return array;
    
    let spliced = [];
    
    console.log("HighestValueFirst: array before sorting " + array.join());

    for (let i = 0; i < array.length; i++) {
        if (array[i] === max) {
            spliced = array.splice(i, 1);
            array.unshift(spliced[0]);
            break;
        }
    }
    console.log("HighestValueFirst: array after sorting " + array.join());
    return array;
}
